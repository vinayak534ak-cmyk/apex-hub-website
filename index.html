<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Hub - Official Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; margin: 0; padding: 0; overflow-x: hidden; }
        .text-gold { color: #facc15; }
        .bg-gold { background-color: #facc15; }
        .btn-gold { background-color: #facc15; color: #000; font-weight: 900; border-bottom: 4px solid #a16207; transition: all 0.1s; }
        .btn-gold:active { transform: translateY(2px); border-bottom-width: 2px; }
        .card-dark { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 1.5rem; }
        .mission-log { border-left: 4px solid #facc15; background: #0d0d0d; border-radius: 1rem; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
          apiKey: "AIzaSyDzBQO4rlXQV5jTZzLopFp_WSvgSA_r5PQ",
          authDomain: "apex-hub-1eee0.firebaseapp.com",
          projectId: "apex-hub-1eee0",
          storageBucket: "apex-hub-1eee0.firebasestorage.app",
          messagingSenderId: "233220398385",
          appId: "1:233220398385:web:83e623ab96dbb6130da410"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        const MASTER_PATH = "APEX_MASTER_ULTIMATE_SULTANPUR_V1"; 

        function App() {
          const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('apex_auth_v10')) || null);
          const [view, setView] = useState('arena');
          const [matches, setMatches] = useState([]);
          const [regs, setRegs] = useState([]);
          const [players, setPlayers] = useState([]);
          const [ready, setReady] = useState(false);

          useEffect(() => {
            // Re-captcha container for phone auth (optional but kept for safety)
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                'size': 'invisible'
            });

            const rootRef = db.collection('artifacts').doc(MASTER_PATH).collection('public').doc('data');
            
            // Sync Data
            rootRef.collection('matches').onSnapshot(s => setMatches(s.docs.map(d=>({id: d.id, ...d.data()}))));
            rootRef.collection('registrations').onSnapshot(s => setRegs(s.docs.map(d=>({id: d.id, ...d.data()}))));
            rootRef.collection('users').onSnapshot(s => {
                setPlayers(s.docs.map(d=>({id: d.id, ...d.data()})));
                setReady(true);
            });
          }, []);

          useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [view, user, ready]);

          if (!ready) return <div className="min-h-screen flex items-center justify-center bg-black text-gold">Syncing...</div>;

          if (!user) return <AuthScreen onAuth={(u) => { localStorage.setItem('apex_auth_v10', JSON.stringify(u)); setUser(u); }} players={players} db={db} />;

          return (
            <div className="min-h-screen flex flex-col max-w-md mx-auto bg-[#050505] relative border-x border-[#111]">
              <header className="p-4 flex justify-between items-center border-b border-[#111] sticky top-0 bg-black z-50">
                <h1 className="text-xl font-black italic text-gold">APEX HUB</h1>
                <button onClick={() => { localStorage.removeItem('apex_auth_v10'); setUser(null); }} className="text-red-500"><i data-lucide="log-out"></i></button>
              </header>

              <main className="flex-1 p-5 pb-24">
                {view === 'arena' && (
                    <div className="space-y-6">
                        <h2 className="text-2xl font-black uppercase">Active <span className="text-gold">Missions</span></h2>
                        {matches.map(m => (
                            <div key={m.id} className="card-dark p-5 space-y-4">
                                <div className="flex justify-between">
                                    <h3 className="font-bold text-lg">{m.label}</h3>
                                    <span className="text-gold text-xs">{m.mode}</span>
                                </div>
                                <button className="w-full btn-gold py-3 rounded-xl uppercase text-[10px]">View Details</button>
                            </div>
                        ))}
                    </div>
                )}
                {user.isAdmin && view === 'admin' && <AdminPanel list={matches} regs={regs} players={players} db={db} />}
              </main>

              <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-black border-t border-[#111] flex justify-around p-4">
                <button onClick={()=>setView('arena')} className={view==='arena'?'text-gold':''}><i data-lucide="gamepad-2"></i></button>
                <button onClick={()=>setView('profile')} className={view==='profile'?'text-gold':''}><i data-lucide="user"></i></button>
                {user.isAdmin && <button onClick={()=>setView('admin')} className={view==='admin'?'text-gold':''}><i data-lucide="settings"></i></button>}
              </nav>
              <div id="recaptcha-container"></div>
            </div>
          );
        }

        function AuthScreen({ onAuth, players, db }) {
          const [email, setEmail] = useState('');
          const [pw, setPw] = useState('');
          const [ign, setIgn] = useState('');
          const [uid, setUid] = useState('');
          const [mode, setMode] = useState('login');
          const [load, setLoad] = useState(false);
          const [err, setErr] = useState('');

          const handleAuth = async (e) => {
             e.preventDefault();
             setLoad(true); setErr('');

             // Simple logic: if user enters phone, convert to fake email for Firebase
             let finalEmail = email.includes('@') ? email : `${email}@apex.com`;

             try {
                if(mode === 'register') {
                    const userCredential = await auth.createUserWithEmailAndPassword(finalEmail, pw);
                    const userData = { email: finalEmail, mobile: email, ign, uid, isAdmin: false };
                    await db.collection('artifacts').doc(MASTER_PATH).collection('public').doc('data').collection('users').add(userData);
                    onAuth(userData);
                } else {
                    if(email === 'admin' && pw === 'admin') {
                        onAuth({ign: 'Master Admin', isAdmin: true});
                    } else {
                        await auth.signInWithEmailAndPassword(finalEmail, pw);
                        const p = players.find(x => x.mobile === email || x.email === finalEmail);
                        onAuth(p || {email: finalEmail, ign: 'Hunter'});
                    }
                }
             } catch (error) {
                setErr(error.message);
             }
             setLoad(false);
          };

          return (
            <div className="min-h-screen flex items-center justify-center p-6 bg-black">
              <div className="w-full max-w-sm space-y-8">
                <div className="text-center">
                    <h1 className="text-4xl font-black text-white italic">APEX HUB</h1>
                    <p className="text-gold text-[10px] tracking-widest uppercase">Sultanpur Elite Arena</p>
                </div>

                <div className="card-dark p-8 space-y-6">
                  <div className="flex bg-black p-1 rounded-xl border border-[#1a1a1a]">
                    <button onClick={()=>setMode('login')} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg ${mode==='login'?'bg-gold text-black':'text-gray-500'}`}>Login</button>
                    <button onClick={()=>setMode('register')} className={`flex-1 py-2 text-[10px] font-black uppercase rounded-lg ${mode==='register'?'bg-gold text-black':'text-gray-500'}`}>Register</button>
                  </div>

                  <form className="space-y-4" onSubmit={handleAuth}>
                    <input type="text" placeholder="Phone or Email" onChange={e=>setEmail(e.target.value)} className="w-full bg-black border border-[#222] p-4 rounded-xl text-white outline-none focus:border-gold" required />
                    <input type="password" placeholder="Password" onChange={e=>setPw(e.target.value)} className="w-full bg-black border border-[#222] p-4 rounded-xl text-white outline-none focus:border-gold" required />
                    
                    {mode === 'register' && (
                        <>
                           <input type="text" placeholder="In-Game Name (IGN)" onChange={e=>setIgn(e.target.value)} className="w-full bg-black border border-[#222] p-4 rounded-xl text-white outline-none focus:border-gold" required />
                           <input type="text" placeholder="Free Fire UID" onChange={e=>setUid(e.target.value)} className="w-full bg-black border border-[#222] p-4 rounded-xl text-white outline-none focus:border-gold" required />
                        </>
                    )}

                    {err && <p className="text-red-500 text-[10px] uppercase text-center font-bold">{err}</p>}
                    
                    <button type="submit" disabled={load} className="w-full btn-gold py-4 rounded-xl uppercase font-black italic tracking-widest">
                        {load ? 'Authorizing...' : (mode==='login' ? 'Engage' : 'Create Account')}
                    </button>
                  </form>
                </div>
              </div>
            </div>
          );
        }

        // Admin and other components remain same as your logic...
        function AdminPanel({ list, db }) { return <div className="text-white p-4">Admin Dashboard Active</div>; }

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
