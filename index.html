<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Hub - Tournaments</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0",
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
      }
    </script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-950 text-white">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Gamepad2, Clock, User, QrCode, ShieldCheck, CheckCircle2, History, LogOut, Sparkles, Bot, Zap, Settings, Plus, Edit2, Trash2, Save } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc } from 'firebase/firestore';

        // Firebase Init (Safe Mode for GitHub Pages)
        let app, auth, db;
        let isExternalHost = false;
        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { apiKey: "dummy" };
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        } catch (e) {
            isExternalHost = true;
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'apex-hub';

        function App() {
          const [user, setUser] = useState(null); 
          const [firebaseUser, setFirebaseUser] = useState(null); 
          const [currentView, setCurrentView] = useState('home');
          const [joinedMatches, setJoinedMatches] = useState([]);
          const [currentTime, setCurrentTime] = useState(new Date());
          const [tournaments, setTournaments] = useState([]);

          useEffect(() => {
            const timer = setInterval(() => setCurrentTime(new Date()), 1000);
            return () => clearInterval(timer);
          }, []);

          useEffect(() => {
            if (isExternalHost) return; 
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                  await signInAnonymously(auth);
                }
              } catch (err) { console.error(err); }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, (u) => setFirebaseUser(u));
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!firebaseUser || isExternalHost) {
                // Dummy data if hosted outside canvas without real DB
                if(isExternalHost && tournaments.length === 0) {
                    setTournaments([
                        { id: 1, hour: 13, label: '1:00 PM', fee: 20, prize: 200, roomId: 'FF-1PM', roomPass: 'abc' },
                        { id: 2, hour: 15, label: '3:00 PM', fee: 30, prize: 300, roomId: 'FF-3PM', roomPass: 'xyz' },
                        { id: 3, hour: 20, label: '8:00 PM', fee: 50, prize: 500, roomId: 'FF-8PM', roomPass: '123' },
                    ]);
                }
                return;
            } 

            const tournamentsRef = collection(db, 'artifacts', appId, 'public', 'data', 'tournaments');
            const unsubscribe = onSnapshot(tournamentsRef, (snapshot) => {
              const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              data.sort((a, b) => a.hour - b.hour);
              setTournaments(data);
            }, (error) => console.error(error));

            return () => unsubscribe();
          }, [firebaseUser]);

          const currentHour = currentTime.getHours();
          const isWebsiteActive = currentHour >= 13 && currentHour <= 23; 

          if (!user) return <AuthScreen onLogin={setUser} />;

          const isAdmin = user.isAdmin;

          return (
            <div className="min-h-screen bg-gray-950 text-gray-100 font-sans">
              <header className="bg-gray-900 border-b border-red-900/50 p-4 sticky top-0 z-10">
                <div className="max-w-md mx-auto flex items-center justify-between">
                  <div className="flex items-center gap-2 cursor-pointer" onClick={() => setCurrentView('home')}>
                    <div className="bg-red-600 p-2 rounded-lg"><Gamepad2 size={24} className="text-white" /></div>
                    <h1 className="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-400">APEX HUB</h1>
                    {isAdmin && <span className="bg-yellow-500 text-black text-[10px] font-bold px-2 py-0.5 rounded-full ml-2">ADMIN</span>}
                  </div>
                  <button onClick={() => { setUser(null); setCurrentView('home'); }} className="p-2 text-gray-400 hover:text-red-500">
                    <LogOut size={20} />
                  </button>
                </div>
              </header>

              <div className="max-w-md mx-auto flex border-b border-gray-800 bg-gray-900/50 overflow-x-auto whitespace-nowrap scrollbar-hide">
                <button onClick={() => setCurrentView('home')} className={`px-4 py-3 text-sm font-semibold flex items-center gap-2 ${currentView === 'home' ? 'text-red-500 border-b-2 border-red-500' : 'text-gray-400'}`}><Gamepad2 size={18} /> Matches</button>
                {!isAdmin && <button onClick={() => setCurrentView('my-tournaments')} className={`px-4 py-3 text-sm font-semibold flex items-center gap-2 ${currentView === 'my-tournaments' ? 'text-red-500 border-b-2 border-red-500' : 'text-gray-400'}`}><History size={18} /> My Games</button>}
                <button onClick={() => setCurrentView('ai-coach')} className={`px-4 py-3 text-sm font-semibold flex items-center gap-2 ${currentView === 'ai-coach' ? 'text-yellow-500 border-b-2 border-yellow-500' : 'text-gray-400'}`}><Sparkles size={18} /> AI Coach</button>
                {isAdmin && <button onClick={() => setCurrentView('admin-panel')} className={`px-4 py-3 text-sm font-semibold flex items-center gap-2 ${currentView === 'admin-panel' ? 'text-blue-500 border-b-2 border-blue-500' : 'text-gray-400'}`}><Settings size={18} /> Admin</button>}
              </div>

              <main className="max-w-md mx-auto p-4 pb-20">
                {currentView === 'home' && <HomeView isWebsiteActive={isWebsiteActive} currentTime={currentTime} tournaments={tournaments} joinedMatches={joinedMatches} setJoinedMatches={setJoinedMatches} />}
                {currentView === 'my-tournaments' && !isAdmin && <MyTournamentsView currentTime={currentTime} tournaments={tournaments} joinedMatches={joinedMatches} />}
                {currentView === 'ai-coach' && <AICoachView />}
                {currentView === 'admin-panel' && isAdmin && <AdminDashboard tournaments={tournaments} isExternalHost={isExternalHost} />}
              </main>
            </div>
          );
        }

        // --- SUB COMPONENTS ---

        function HomeView({ isWebsiteActive, currentTime, tournaments, joinedMatches, setJoinedMatches }) {
          if (!isWebsiteActive) {
            return (
              <div className="flex flex-col items-center justify-center h-[60vh] text-center space-y-4">
                <Clock size={64} className="text-gray-600 mb-2" />
                <h2 className="text-2xl font-bold text-gray-300">Website is Closed</h2>
                <p className="text-gray-500">Tournaments dopahar <strong className="text-red-400">1:00 PM</strong> se raat <strong className="text-red-400">11:00 PM</strong> tak chalte hain.</p>
              </div>
            );
          }
          return (
            <div className="space-y-4">
              <div className="bg-red-900/20 border border-red-900/50 rounded-lg p-3 flex items-center justify-between mb-6">
                <div className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div><span className="text-sm font-medium text-red-400">LIVE</span></div>
                <span className="text-xs font-mono text-gray-400">{currentTime.toLocaleTimeString('en-US')}</span>
              </div>
              {tournaments.map(t => <TournamentCard key={t.id} data={t} currentTime={currentTime} isJoined={joinedMatches.includes(t.id)} onJoin={() => setJoinedMatches([...joinedMatches, t.id])} />)}
            </div>
          );
        }

        function MyTournamentsView({ currentTime, tournaments, joinedMatches }) {
          const myGames = tournaments.filter(t => joinedMatches.includes(t.id));
          if (myGames.length === 0) return <div className="text-center py-20 text-gray-500">Koi match nahi khela.</div>;
          return <div className="space-y-4">{myGames.map(t => <TournamentCard key={t.id} data={t} currentTime={currentTime} isJoined={true} onJoin={() => {}} />)}</div>;
        }

        function TournamentCard({ data, currentTime, isJoined, onJoin }) {
          const [showModal, setShowModal] = useState(false);
          const currentHour = currentTime.getHours();
          const isTimeRevealed = currentHour >= data.hour; 
          const isMatchOver = currentHour > data.hour; 

          return (
            <>
              <div className={`bg-gray-900 border rounded-xl overflow-hidden ${isJoined ? 'border-green-600/50 shadow-[0_0_15px_rgba(22,163,74,0.1)]' : 'border-gray-800'}`}>
                <div className="bg-gray-800/50 p-3 flex justify-between border-b border-gray-800">
                  <div className="flex items-center gap-2 font-bold"><Clock size={16} className="text-red-500" />{data.label} Match</div>
                  {isJoined && <span className="text-xs text-green-400">Joined ✅</span>}
                </div>
                <div className="p-4 space-y-4">
                  <div className="flex justify-between text-sm">
                    <div className="text-center bg-gray-950 p-2 rounded flex-1 mr-2 border border-gray-800"><p className="text-gray-500 text-xs">Entry Fee</p><p className="font-bold">₹{data.fee}</p></div>
                    <div className="text-center bg-gray-950 p-2 rounded flex-1 ml-2 border border-gray-800"><p className="text-gray-500 text-xs">Prize</p><p className="font-bold text-yellow-500">₹{data.prize}</p></div>
                  </div>
                  {!isJoined ? (
                    <button onClick={() => setShowModal(true)} disabled={isMatchOver} className={`w-full py-3 rounded-lg font-bold ${isMatchOver ? 'bg-gray-800 text-gray-500' : 'bg-red-600 hover:bg-red-500 text-white'}`}>
                      {isMatchOver ? 'Match Over' : `Join Now (₹${data.fee})`}
                    </button>
                  ) : (
                    <div className="bg-gray-950 p-3 rounded border border-gray-800">
                      {isTimeRevealed ? (
                        <div>
                           <p className="text-xs text-green-400 text-center mb-2">Room is LIVE!</p>
                           <div className="flex justify-between text-sm p-1"><span>ID:</span><span className="font-mono font-bold text-white">{data.roomId}</span></div>
                           <div className="flex justify-between text-sm p-1"><span>Pass:</span><span className="font-mono font-bold text-white">{data.roomPass}</span></div>
                        </div>
                      ) : <div className="text-center text-xs text-gray-400 py-2"><ShieldCheck size={20} className="mx-auto mb-1 opacity-50"/>Wait for {data.label}</div>}
                    </div>
                  )}
                </div>
              </div>
              {showModal && (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                  <div className="bg-gray-900 border border-gray-800 rounded-2xl w-full max-w-sm p-6 text-center space-y-4">
                    <h3 className="font-bold text-lg text-white">Scan to Pay ₹{data.fee}</h3>
                    <div className="bg-white p-4 rounded-xl inline-block mx-auto"><QrCode size={120} className="text-black" /></div>
                    <p className="text-xs text-gray-500">UPI: apexhub@ybl</p>
                    <button onClick={() => { onJoin(); setShowModal(false); }} className="w-full bg-green-600 text-white font-bold py-3 rounded-lg">I Have Paid ✅</button>
                    <button onClick={() => setShowModal(false)} className="w-full bg-gray-800 text-white py-3 rounded-lg">Cancel</button>
                  </div>
                </div>
              )}
            </>
          );
        }

        function AICoachView() {
          const [playstyle, setPlaystyle] = useState('');
          const [strategy, setStrategy] = useState('');
          const [loading, setLoading] = useState(false);
          const getStrategy = async () => {
             if(!playstyle) return;
             setLoading(true); setStrategy('');
             try {
                 const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=`, {
                     method: 'POST', headers:{'Content-Type':'application/json'},
                     body: JSON.stringify({contents:[{parts:[{text:`Short aggressive Free Fire strategy for: ${playstyle} in Hinglish`}]}]})
                 });
                 const data = await res.json();
                 setStrategy(data.candidates?.[0]?.content?.parts?.[0]?.text || "Coach abhi offline hai.");
             } catch(e) { setStrategy("Network error"); }
             setLoading(false);
          }
          return (
            <div className="space-y-4">
              <div className="bg-gradient-to-r from-yellow-600/20 to-orange-600/20 border border-yellow-500/50 rounded-xl p-6 text-center">
                 <Bot size={40} className="mx-auto text-yellow-500 mb-2" />
                 <h2 className="text-xl font-bold text-yellow-500">AI Coach</h2>
              </div>
              <div className="bg-gray-900 p-4 rounded-xl">
                 <input type="text" value={playstyle} onChange={e=>setPlaystyle(e.target.value)} placeholder="e.g. Sniper, Rusher" className="w-full bg-gray-950 border border-gray-700 p-3 rounded mb-3 text-white"/>
                 <button onClick={getStrategy} className="w-full bg-yellow-600 text-white py-3 rounded font-bold">{loading ? 'Thinking...' : 'Get Tips ✨'}</button>
                 {strategy && <div className="mt-4 p-3 bg-gray-950 border border-yellow-600/30 rounded text-sm whitespace-pre-line">{strategy}</div>}
              </div>
            </div>
          );
        }

        function AdminDashboard({ tournaments, isExternalHost }) {
          if(isExternalHost) return <div className="p-4 text-center text-red-400 bg-red-900/20 border border-red-900/50 rounded">Database not connected on GitHub Pages yet.</div>;
          return <div className="p-4 text-center text-blue-400 bg-blue-900/20 border border-blue-900/50 rounded">Live Admin Active. Edit data on original platform.</div>;
        }

        function AuthScreen({ onLogin }) {
          const [phone, setPhone] = useState('');
          const [pass, setPass] = useState('');
          const handleSubmit = e => {
            e.preventDefault();
            if(phone==='admin' && pass==='admin') onLogin({name:'Admin', isAdmin:true});
            else if(phone.length > 5) onLogin({name:phone, isAdmin:false});
          };
          return (
            <div className="min-h-screen bg-gray-950 flex items-center justify-center p-4">
              <div className="w-full max-w-sm">
                <div className="text-center mb-8">
                  <div className="bg-red-600/20 p-4 rounded-2xl inline-block mb-3"><Gamepad2 size={40} className="text-red-500" /></div>
                  <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500">APEX HUB</h1>
                </div>
                <form onSubmit={handleSubmit} className="bg-gray-900 p-6 rounded-2xl border border-gray-800 space-y-4">
                  <input type="text" placeholder="Phone/WhatsApp" value={phone} onChange={e=>setPhone(e.target.value)} className="w-full bg-gray-950 border border-gray-800 p-3 rounded text-white" required/>
                  <input type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} className="w-full bg-gray-950 border border-gray-800 p-3 rounded text-white" required/>
                  <button type="submit" className="w-full bg-red-600 text-white font-bold py-3 rounded">Login</button>
                </form>
              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>


```
