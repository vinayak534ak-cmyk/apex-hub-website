```react
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Hub - Sultanpur Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0",
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
      }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap');
        body { font-family: 'Rajdhani', sans-serif; background-color: #050505; color: white; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(10px); }
        .slot-bar-fill { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Gamepad2, Users, Settings, Trash2, CheckCircle2, ShieldAlert, LogOut, User, Trophy, CalendarCheck, Smartphone, Key, CircleDollarSign, PlusSquare, Info } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc, getDocs } from 'firebase/firestore';

        // --- FIREBASE CONFIG (ASLI WALA) ---
        const firebaseConfig = {
          apiKey: "AIzaSyDzBQO4rlXQV5jTZzLopFp_WSvgSA_r5PQ",
          authDomain: "apex-hub-1eee0.firebaseapp.com",
          projectId: "apex-hub-1eee0",
          storageBucket: "apex-hub-1eee0.firebasestorage.app",
          messagingSenderId: "233220398385",
          appId: "1:233220398385:web:83e623ab96dbb6130da410"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "apex-hub-sultanpur-final";

        function App() {
          const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('apex_v10_user') || 'null'));
          const [isNewUser, setIsNewUser] = useState(false);
          const [view, setView] = useState('matches'); // matches, mygames, rewards, rules, admin
          const [matchType, setMatchType] = useState('solo');
          
          const [tournaments, setTournaments] = useState([]);
          const [registrations, setRegistrations] = useState([]);
          const [players, setPlayers] = useState([]);

          useEffect(() => {
            signInAnonymously(auth);
            
            const unsubT = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'tournaments'), s => {
              setTournaments(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => a.hour - b.hour));
            });
            const unsubR = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'), s => {
              setRegistrations(s.docs.map(d => ({id: d.id, ...d.data()})));
            });
            const unsubU = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), s => {
              setPlayers(s.docs.map(d => ({id: d.id, ...d.data()})));
            });

            return () => { unsubT(); unsubR(); unsubU(); };
          }, []);

          const logout = () => { localStorage.removeItem('apex_v10_user'); setUser(null); };

          if (!user) return <AuthScreen onAuth={(u, isNew) => { if(isNew) { setUser(u); setIsNewUser(true); } else { setUser(u); } }} players={players} />;
          
          if (isNewUser) return <SetupScreen user={user} onDone={(full) => {
            addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'users'), { ...full, isAdmin: false, matchesPlayed: 0, attendance: [] });
            localStorage.setItem('apex_v10_user', JSON.stringify(full));
            setUser(full);
            setIsNewUser(false);
          }} />;

          return (
            <div className="min-h-screen flex flex-col max-w-md mx-auto bg-[#050505] border-x border-gray-900 shadow-2xl relative">
              {/* Header */}
              <header className="p-4 flex justify-between items-center bg-gray-900/80 border-b border-orange-600/20 sticky top-0 z-50 backdrop-blur-md">
                <div className="flex items-center gap-2">
                  <img src="./1000087916.webp" className="w-10 h-10 rounded-lg border border-orange-500/30" />
                  <h1 className="text-xl font-bold text-orange-500 italic uppercase">APEX HUB</h1>
                </div>
                <button onClick={logout} className="p-1.5 bg-gray-800 rounded text-red-500"><LogOut size={18}/></button>
              </header>

              {/* Content */}
              <main className="flex-1 p-4 pb-24 overflow-y-auto scrollbar-hide">
                {view === 'matches' && <MatchesView type={matchType} setType={setMatchType} list={tournaments} regs={registrations} user={user} db={db} />}
                {view === 'mygames' && <MyGamesView list={tournaments} regs={registrations} user={user} />}
                {view === 'rewards' && <RewardsView user={user} db={db} players={players} />}
                {view === 'rules' && <RulesView />}
                {view === 'admin' && <AdminPanel list={tournaments} regs={registrations} players={players} db={db} />}
              </main>

              {/* Bottom Navigation */}
              <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-gray-900 border-t border-gray-800 flex justify-around p-2 z-[100]">
                <NavTab active={view==='matches'} icon={<Gamepad2 size={20}/>} label="Matches" onClick={()=>setView('matches')} />
                <NavTab active={view==='mygames'} icon={<Trophy size={20}/>} label="My Games" onClick={()=>setView('mygames')} />
                <NavTab active={view==='rewards'} icon={<CalendarCheck size={20}/>} label="Rewards" onClick={()=>setView('rewards')} />
                <NavTab active={view==='rules'} icon={<Info size={20}/>} label="Rules" onClick={()=>setView('rules')} />
                {user.isAdmin && <NavTab active={view==='admin'} icon={<Settings size={20}/>} label="Admin" onClick={()=>setView('admin')} />}
              </nav>
            </div>
          );
        }

        const NavTab = ({ active, icon, label, onClick }) => (
          <button onClick={onClick} className={`flex flex-col items-center gap-1 flex-1 py-1 ${active ? 'text-orange-500 scale-110' : 'text-gray-500'}`}>
            {icon}<span className="text-[9px] font-bold uppercase">{label}</span>
          </button>
        );

        function MatchesView({ type, setType, list, regs, user, db }) {
          const filtered = list.filter(m => m.type === type);
          return (
            <div className="space-y-5">
              <div className="flex bg-gray-900 p-1 rounded-2xl border border-gray-800">
                <button onClick={()=>setType('solo')} className={`flex-1 py-3 text-xs font-bold uppercase rounded-xl ${type==='solo'?'bg-orange-600 shadow-lg':'text-gray-500'}`}>Solo Battle</button>
                <button onClick={()=>setType('squad')} className={`flex-1 py-3 text-xs font-bold uppercase rounded-xl ${type==='squad'?'bg-orange-600 shadow-lg':'text-gray-500'}`}>Squad Battle</button>
              </div>
              {filtered.length === 0 ? <p className="text-center py-20 text-gray-700 uppercase font-bold text-xs italic">No {type} battles found.</p> :
               filtered.map(m => <MatchCard key={m.id} m={m} user={user} regs={regs} db={db} />)}
            </div>
          );
        }

        function MatchCard({ m, user, regs, db }) {
          const [modal, setModal] = useState(false);
          const [load, setLoad] = useState(false);
          const [sq, setSq] = useState({p1:'', p2:'', p3:'', p4:''});
          
          const myReg = regs.find(r => r.matchId === m.id && r.mobile === user.mobile);
          const approvedCount = regs.filter(r => r.matchId === m.id && r.status === 'approved').length;
          const isFull = approvedCount >= m.slots;
          const progress = (approvedCount / m.slots) * 100;

          const handleJoin = async (utr) => {
            if(!utr) return alert("UTR Required!");
            setLoad(true);
            try {
              await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'registrations'), {
                matchId: m.id, mobile: user.mobile, ign: user.ign, uid: user.uid, utr,
                status: 'pending', time: Date.now(), matchLabel: m.label, type: m.type,
                squad: m.type === 'squad' ? sq : null
              });
              setModal(false);
            } catch(e) { alert("Error joining!"); }
            setLoad(false);
          };

          return (
            <div className="bg-[#111] border border-gray-800 rounded-[2rem] overflow-hidden shadow-2xl transition-all mb-4">
              <div className="p-4 bg-gray-800/40 flex justify-between items-center border-b border-white/5">
                <span className="font-bold text-sm uppercase italic text-white">{m.label} Battle</span>
                {myReg ? (
                   myReg.status === 'approved' ? <span className="bg-green-600 text-[10px] font-bold px-3 py-1 rounded-full">Joined ✅</span> : 
                   <span className="bg-[#222] text-gray-500 text-[10px] font-bold px-3 py-1 rounded-full animate-pulse uppercase">Checking</span>
                ) : <span className="text-orange-500 text-[10px] font-bold uppercase italic">Open</span>}
              </div>

              <div className="p-6 space-y-5">
                {/* Slots Progress Bar */}
                <div className="space-y-1.5">
                   <div className="flex justify-between text-[10px] font-bold uppercase text-gray-500 tracking-widest">
                      <span>Live Slots Filled</span>
                      <span className="text-orange-500">{approvedCount} / {m.slots}</span>
                   </div>
                   <div className="w-full h-3 bg-black rounded-full border border-white/5 overflow-hidden p-0.5">
                      <div className="h-full bg-gradient-to-r from-orange-600 to-orange-400 rounded-full slot-bar-fill shadow-[0_0_10px_rgba(249,115,22,0.4)]" style={{width: `${progress}%`}}></div>
                   </div>
                </div>

                {!myReg ? (
                   <button onClick={()=>setModal(true)} disabled={isFull} className="w-full bg-orange-600 py-4 rounded-2xl font-black uppercase text-xs shadow-lg active:scale-95 transition-all">Join Tournament</button>
                ) : myReg.status === 'pending' ? (
                   <button className="w-full bg-black/40 border border-gray-800 text-gray-600 py-4 rounded-2xl font-bold uppercase text-[10px] italic cursor-not-allowed">Waiting for Approval...</button>
                ) : (
                   <div className="bg-black p-4 rounded-2xl border border-green-500/20 text-center space-y-2">
                      <p className="text-green-500 font-bold text-sm select-all">ROOM ID: {m.roomId || 'WAIT'}</p>
                      <p className="text-green-500 font-bold text-sm select-all">PASS: {m.roomPass || 'WAIT'}</p>
                   </div>
                )}
                
                <div className="grid grid-cols-2 gap-4 text-center">
                   <div className="text-gray-500 uppercase text-[9px] font-bold">Entry: <span className="text-white">₹{m.fee}</span></div>
                   <div className="text-gray-500 uppercase text-[9px] font-bold">Prize: <span className="text-orange-500 font-black">₹{m.prize}</span></div>
                </div>
              </div>

              {modal && <div className="fixed inset-0 bg-black/95 backdrop-blur-xl z-[150] flex items-center justify-center p-6 overflow-y-auto">
                <div className="bg-[#111] border border-gray-800 w-full rounded-[2.5rem] p-8 space-y-5 my-auto shadow-2xl">
                   <h3 className="text-xl font-bold text-orange-500 text-center uppercase italic tracking-tighter">Submit Proof</h3>
                   <img src="./1000087879.jpg" className="w-40 h-40 mx-auto rounded-xl border-2 border-white shadow-xl" />
                   <p className="text-center text-[10px] text-gray-500 font-mono">PAY ₹{m.fee} TO apexhub@ybl</p>
                   
                   {m.type === 'squad' && (
                     <div className="grid grid-cols-2 gap-2">
                        <input type="text" placeholder="P1 IGN" onChange={e=>setSq({...sq, p1:e.target.value})} className="bg-black border border-gray-800 p-3 rounded-xl text-[10px] font-bold" />
                        <input type="text" placeholder="P2 IGN" onChange={e=>setSq({...sq, p2:e.target.value})} className="bg-black border border-gray-800 p-3 rounded-xl text-[10px] font-bold" />
                        <input type="text" placeholder="P3 IGN" onChange={e=>setSq({...sq, p3:e.target.value})} className="bg-black border border-gray-800 p-3 rounded-xl text-[10px] font-bold" />
                        <input type="text" placeholder="P4 IGN" onChange={e=>setSq({...sq, p4:e.target.value})} className="bg-black border border-gray-800 p-3 rounded-xl text-[10px] font-bold" />
                     </div>
                   )}
                   
                   <input type="text" id="utr_master" placeholder="12 Digit UTR Number" className="w-full bg-[#050505] border border-orange-500/30 p-5 rounded-2xl text-sm font-bold text-white outline-none focus:border-orange-500" />
                   <button onClick={()=>handleJoin(document.getElementById('utr_master').value)} disabled={load} className="w-full bg-green-600 py-4 rounded-2xl font-bold uppercase text-xs shadow-xl">{load?'Processing...':'Send Request'}</button>
                   <button onClick={()=>setModal(false)} className="w-full text-[10px] text-gray-600 font-bold uppercase text-center italic">Go Back</button>
                </div>
              </div>}
            </div>
          );
        }

        function MyGamesView({ list, regs, user }) {
          const myRegs = regs.filter(r => r.mobile === user.mobile);
          const myMatches = list.filter(m => myRegs.some(r => r.matchId === m.id));
          return (
            <div className="space-y-4">
              <h2 className="text-xs font-bold uppercase text-gray-500 tracking-widest pl-2">Battle History</h2>
              {myMatches.length === 0 ? <p className="text-center py-20 text-gray-800 uppercase font-bold text-[10px] italic">No Battles Found.</p> :
               myMatches.map(m => <MatchCard key={m.id} m={m} user={user} regs={regs} db={{}} />)}
            </div>
          );
        }

        function RewardsView({ user, db, players }) {
          const today = new Date().toDateString();
          const pDoc = players.find(p => p.mobile === user.mobile);
          const attendance = pDoc?.attendance || [];
          const canMark = pDoc?.lastLogin !== today;

          const mark = async () => {
             if(!canMark) return alert("Aaj ki attendance lag chuki hai!");
             const ref = doc(db, 'artifacts', appId, 'public', 'data', 'users', pDoc.id);
             await updateDoc(ref, { lastLogin: today, attendance: [...attendance, today] });
             alert("Attendance Marked! Day " + (attendance.length + 1));
          };

          return (
            <div className="space-y-8 animate-in zoom-in-95">
               <div className="bg-orange-600/10 p-10 rounded-[3rem] border border-orange-500/20 text-center shadow-xl">
                  <CalendarCheck size={56} className="mx-auto text-orange-500 mb-3" />
                  <h2 className="text-2xl font-black italic uppercase text-orange-500 tracking-tighter">Daily Bonus</h2>
                  <p className="text-[10px] text-gray-500 font-bold uppercase mt-2 tracking-widest underline decoration-orange-500/40 underline-offset-4">Sultanpur Elite Program</p>
               </div>
               <div className="grid grid-cols-4 gap-3">
                  {[1,2,3,4,5,6,7].map(d => (
                     <div key={d} className={`aspect-square rounded-2xl flex items-center justify-center border-2 transition-all ${attendance.length >= d ? 'bg-green-600 border-green-400' : 'bg-gray-900 border-gray-800 shadow-inner'}`}>
                        <p className={`font-black text-lg ${attendance.length >= d ? 'text-white' : 'text-gray-700'}`}>{d}</p>
                     </div>
                  ))}
               </div>
               <button onClick={mark} disabled={!canMark} className={`w-full py-5 rounded-[2.5rem] font-bold uppercase italic shadow-xl transition-all ${canMark ? 'bg-orange-600 shadow-orange-950/30' : 'bg-gray-800 text-gray-600 grayscale'}`}>
                  {canMark ? 'Claim Attendance' : 'Marked for Today ✅'}
               </button>
            </div>
          );
        }

        function RulesView() {
          return (
            <div className="space-y-6">
              <div className="bg-red-600/10 border border-red-600/30 p-10 rounded-[3rem] text-center shadow-xl">
                <ShieldAlert size={64} className="mx-auto text-red-500 mb-4" />
                <h2 className="text-2xl font-bold italic uppercase text-red-500 tracking-tighter">Protocols</h2>
              </div>
              <div className="bg-[#111] p-8 rounded-[3rem] border border-white/5 space-y-6 text-[11px] font-bold text-gray-400 italic leading-relaxed">
                <p>1. <span className="text-orange-500">NO TEAMING:</span> Strictly Solo/Squad play. Violation = Instant Disqualification.</p>
                <p>2. <span className="text-orange-500">NO CHEATS:</span> Scripts, Panels or Tools result in Permanent BAN.</p>
                <p>3. <span className="text-orange-500">REFUNDS:</span> 50% refund provided for match cancellation only.</p>
              </div>
            </div>
          );
        }

        function AdminPanel({ list, regs, players, db }) {
          const [atab, setAtab] = useState('match'); 
          const [am, setAm] = useState({ hour: 18, label: '6:00 PM', fee: 20, prize: 200, type: 'solo', slots: 48 });
          const pending = regs.filter(r => r.status === 'pending');
          const todayS = new Date().toDateString();
          const activeToday = players.filter(p => p.lastLogin === todayS);

          return (
            <div className="space-y-6 pb-20">
              <div className="grid grid-cols-4 gap-2 bg-[#111] p-1 rounded-2xl border border-white/5">
                <button onClick={()=>setAtab('match')} className={`py-3 text-[8px] font-bold uppercase rounded-xl ${atab==='match'?'bg-orange-600':'text-gray-500'}`}>Setup</button>
                <button onClick={()=>setAtab('reg')} className={`py-3 text-[8px] font-bold uppercase rounded-xl ${atab==='reg'?'bg-red-600':'text-gray-500'}`}>Regs ({pending.length})</button>
                <button onClick={()=>setAtab('players')} className={`py-3 text-[8px] font-bold uppercase rounded-xl ${atab==='players'?'bg-blue-600 text-white':'text-gray-500'}`}>Users</button>
                <button onClick={()=>setAtab('login')} className={`py-3 text-[8px] font-bold uppercase rounded-xl ${atab==='login'?'bg-yellow-600 text-black':'text-gray-500'}`}>Login</button>
              </div>

              {atab === 'match' && (
                <div className="space-y-4 animate-in fade-in">
                    <div className="bg-[#111] p-6 rounded-3xl border border-gray-800 space-y-4 shadow-xl">
                       <h3 className="text-xs font-bold text-blue-500 uppercase italic">Add Battle Config</h3>
                       <div className="grid grid-cols-2 gap-3">
                          <select onChange={e=>setAm({...am, type:e.target.value})} className="bg-black border border-gray-800 p-4 rounded-xl text-xs font-bold text-white"><option value="solo">Solo</option><option value="squad">Squad</option></select>
                          <input type="number" placeholder="Slots" onChange={e=>setAm({...am, slots:e.target.value})} className="bg-black border border-gray-800 p-4 rounded-xl text-xs font-bold" />
                          <input type="number" placeholder="Hr(24h)" onChange={e=>setAm({...am, hour:e.target.value})} className="bg-black border border-gray-800 p-4 rounded-xl text-xs font-bold" />
                          <input type="text" placeholder="Label" onChange={e=>setAm({...am, label:e.target.value})} className="bg-black border border-gray-800 p-4 rounded-xl text-xs font-bold" />
                          <input type="number" placeholder="Fee" onChange={e=>setAm({...am, fee:e.target.value})} className="bg-black border border-gray-800 p-4 rounded-xl text-xs font-bold" />
                          <input type="number" placeholder="Prize" onChange={e=>setAm({...am, prize:e.target.value})} className="bg-black border border-gray-800 p-4 rounded-xl text-xs font-bold" />
                       </div>
                       <button onClick={async ()=>{
                          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'tournaments'), { ...am, hour:Number(am.hour), fee:Number(am.fee), prize:Number(am.prize), slots:Number(am.slots), roomId:'', roomPass:'' });
                          alert("Arena Live!");
                       }} className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase text-xs shadow-xl active:scale-95 transition-all">Deploy Battle</button>
                    </div>
                    {list.map(t => (
                       <div key={t.id} className="bg-[#111] p-4 rounded-[1.5rem] border border-gray-800 space-y-3">
                          <div className="flex justify-between items-center text-[10px] font-bold uppercase italic">
                             <span>{t.label} {t.type} Arena</span>
                             <button onClick={()=>deleteDoc(doc(db,'artifacts',appId,'public','data','tournaments',t.id))}><Trash2 size={16} className="text-red-500"/></button>
                          </div>
                          <div className="grid grid-cols-2 gap-2">
                             <input type="text" placeholder="Room ID" className="bg-black border border-gray-800 p-2 rounded-lg text-xs font-mono font-bold text-orange-500" onBlur={e=>updateDoc(doc(db,'artifacts',appId,'public','data','tournaments',t.id),{roomId:e.target.value})} defaultValue={t.roomId} />
                             <input type="text" placeholder="Pass" className="bg-black border border-gray-800 p-2 rounded-lg text-xs font-mono font-bold text-orange-500" onBlur={e=>updateDoc(doc(db,'artifacts',appId,'public','data','tournaments',t.id),{roomPass:e.target.value})} defaultValue={t.roomPass} />
                          </div>
                       </div>
                    ))}
                </div>
              )}

              {atab === 'reg' && (
                <div className="space-y-4">
                  {pending.map(r => (
                    <div key={r.id} className="bg-[#111] border-l-4 border-orange-500 p-5 rounded-2xl space-y-3 shadow-xl">
                      <div className="flex justify-between items-start">
                         <div>
                            <p className="font-bold text-white italic uppercase text-lg leading-none">{r.ign}</p>
                            <p className="text-[10px] text-gray-500 font-bold mt-1 uppercase tracking-tighter italic">UID: {r.uid} | M: {r.mobile}</p>
                         </div>
                         <p className="text-[10px] font-bold text-orange-500 uppercase italic tracking-tighter">{r.matchLabel}</p>
                      </div>
                      {r.squad && <div className="bg-black p-3 rounded-xl text-[10px] text-gray-400 font-bold border border-white/5">Squad: {r.squad.p1}, {r.squad.p2}, {r.squad.p3}, {r.squad.p4}</div>}
                      <div className="bg-black p-3 rounded-xl border border-gray-800 text-center text-xs font-mono text-yellow-500 font-black">UTR: {r.utr}</div>
                      <div className="flex gap-4">
                         <button onClick={async ()=>{
                            const u = players.find(p => p.mobile === r.mobile);
                            if(u) await updateDoc(doc(db,'artifacts',appId,'public','data','users',u.id), {matchesPlayed: (u.matchesPlayed || 0) + 1});
                            await updateDoc(doc(db,'artifacts',appId,'public','data', 'registrations', r.id),{status:'approved'});
                         }} className="flex-1 bg-green-600 text-white py-3 rounded-xl text-[11px] font-bold uppercase">Approve ✅</button>
                         <button onClick={()=>deleteDoc(doc(db,'artifacts',appId,'public','data','registrations',r.id))} className="flex-1 bg-gray-800 text-gray-600 py-3 rounded-xl text-[11px] font-bold uppercase">Reject</button>
                      </div>
                    </div>
                  ))}
                </div>
              )}

              {atab === 'players' && (
                <div className="space-y-4">
                   <h3 className="text-[11px] font-bold text-blue-500 uppercase italic px-2 tracking-widest italic font-black underline underline-offset-4 decoration-blue-500/30">Player Database</h3>
                   {players.map(p => (

        function AuthScreen({ onAuth, players }) {
          const [id, setId] = useState('');
          const [pw, setPw] = useState('');

             if(e) e.preventDefault();
             if(!id || !pw) return alert("Bhai, Details dalo!");
             if(id === 'admin' && pw === 'admin') return onAuth({mobile:'admin', isAdmin:true}, false);
             const exists = players.find(p => p.mobile === id);
             if(exists) {
                if(exists.pw === pw) onAuth(exists, false);
                else alert("Wrong Passcode!");
             } else {
                onAuth({mobile: id, pw}, true);
             }
          };
          return (
            <div className="min-h-screen flex flex-col items-center justify-center p-10 bg-[#050505] font-sans">
              <div className="w-full max-w-sm text-center space-y-12 animate-in fade-in duration-1000">

                   <img src="./1000087916.webp" className="w-36 h-36 mx-auto rounded-[3rem] border-2 border-orange-500 shadow-[0_0_50px_rgba(249,115,22,0.3)]" />
                   <h1 className="text-5xl font-bold italic text-orange-500 uppercase tracking-tighter leading-none">APEX HUB</h1>
                   <p className="text-[10px] text-gray-600 font-bold uppercase tracking-[0.4em] italic leading-none">Sultanpur Elite Arena</p>
                </div>
                <div className="bg-[#0f0f0f] p-10 rounded-[3.5rem] border border-gray-800 shadow-2xl space-y-8 relative overflow-hidden group">
                  <form className="space-y-5" onSubmit={submit}>
                    <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest italic border-b border-gray-800 pb-2">Arena Entrance Portal</p>
                    <input type="text" placeholder="Mobile Number" value={id} onChange={e=>setId(e.target.value)} className="w-full bg-black border border-gray-800 p-5 rounded-3xl text-sm font-bold text-white focus:border-orange-500 outline-none transition-all shadow-inner" />
                    <input type="password" placeholder="Arena Passcode" value={pw} onChange={e=>setPw(e.target.value)} className="w-full bg-black border border-gray-800 p-5 rounded-3xl text-sm font-bold text-white focus:border-orange-500 outline-none transition-all shadow-inner" />
                    <button type="submit" className="w-full bg-orange-600 py-5 rounded-[2rem] font-bold uppercase italic shadow-xl text-xs border-b-4 border-orange-950 active:scale-95 transition-all">Enter Battlefield</button>
                  </form>
                </div>
              </div>
            </div>
          );
        }

        function SetupScreen({ user, onDone }) {
           const [ign, setIgn] = useState('');

           return (
             <div className="min-h-screen flex flex-col items-center justify-center p-10 bg-[#050505]">
               <div className="w-full max-w-sm text-center space-y-10 animate-in slide-in-from-top-4 duration-500">
                  <div className="space-y-4">
                     <p className="text-xs font-bold text-orange-500 uppercase italic">New Hunter Detected!</p>
                     <h2 className="text-3xl font-bold uppercase tracking-tighter leading-none italic">Initialize Profile</h2>
                  </div>
                  <div className="bg-[#0f0f0f] p-10 rounded-[3.5rem] border border-orange-500/20 shadow-2xl space-y-6">
                     <input type="text" placeholder="Free Fire Name (IGN)" onChange={e=>setIgn(e.target.value)} className="w-full bg-black border border-white/5 p-5 rounded-3xl text-sm font-bold text-white focus:border-orange-500 outline-none" />
                     <input type="number" placeholder="Free Fire UID (ID)" onChange={e=>setUid(e.target.value)} className="w-full bg-black border border-white/5 p-5 rounded-3xl text-sm font-bold text-white focus:border-orange-500 outline-none" />
                     <button onClick={()=>onDone({...user, ign, uid})} className="w-full bg-green-600 py-5 rounded-[2.5rem] font-bold uppercase italic text-xs shadow-xl active:scale-95 transition-all">Save & Enter Battle</button>
                  </div>

        createRoot(document.getElementById('root')).render(<App />);
