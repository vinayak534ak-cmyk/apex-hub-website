```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Hub - Free Fire Tournaments</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0",
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
      }
    </script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-950 text-white selection:bg-red-500/30">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Gamepad2, Clock, User, QrCode, ShieldCheck, CheckCircle2, History, LogOut, Sparkles, Bot, Zap, Settings, Plus, Edit2, Trash2, Save } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc } from 'firebase/firestore';

        // --- FIREBASE ASLI CONFIG CONNECTED ---
        const firebaseConfig = {
          apiKey: "AIzaSyDzBQO4rlXQV5jTZzLopFp_WSvgSA_r5PQ",
          authDomain: "apex-hub-1eee0.firebaseapp.com",
          projectId: "apex-hub-1eee0",
          storageBucket: "apex-hub-1eee0.firebasestorage.app",
          messagingSenderId: "233220398385",
          appId: "1:233220398385:web:83e623ab96dbb6130da410",
          measurementId: "G-RHLDYCWM54"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
          const [user, setUser] = useState(null); 
          const [currentView, setCurrentView] = useState('home');
          const [joinedMatches, setJoinedMatches] = useState([]);
          const [currentTime, setCurrentTime] = useState(new Date());
          const [tournaments, setTournaments] = useState([]);

          useEffect(() => {
            const timer = setInterval(() => setCurrentTime(new Date()), 1000);
            return () => clearInterval(timer);
          }, []);

          useEffect(() => {
            signInAnonymously(auth).catch(err => console.error("Auth Error:", err));
            const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
              if (u) {
                const tournamentsRef = collection(db, 'tournaments');
                const unsubscribeSnap = onSnapshot(tournamentsRef, (snapshot) => {
                  const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                  data.sort((a, b) => a.hour - b.hour);
                  setTournaments(data);
                });
                return () => unsubscribeSnap();
              }
            });
            return () => unsubscribeAuth();
          }, []);

          const currentHour = currentTime.getHours();
          const isWebsiteActive = currentHour >= 13 && currentHour <= 23; 

          if (!user) return <AuthScreen onLogin={setUser} />;

          return (
            <div className="min-h-screen bg-gray-950 text-gray-100 font-sans">
              <header className="bg-gray-900 border-b border-red-900/50 p-4 sticky top-0 z-50">
                <div className="max-w-md mx-auto flex items-center justify-between">
                  <div className="flex items-center gap-2 cursor-pointer" onClick={() => setCurrentView('home')}>
                    <div className="bg-red-600 p-2 rounded-lg shadow-[0_0_15px_rgba(220,38,38,0.5)]">
                      <Gamepad2 size={24} className="text-white" />
                    </div>
                    <h1 className="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-400">APEX HUB</h1>
                  </div>
                  <button onClick={() => setUser(null)} className="p-2 text-gray-400 hover:text-red-500 transition-colors"><LogOut size={20} /></button>
                </div>
              </header>

              <nav className="max-w-md mx-auto flex border-b border-gray-800 bg-gray-900/50 sticky top-[65px] z-40 backdrop-blur-md">
                <button onClick={() => setCurrentView('home')} className={`flex-1 py-3 text-xs font-bold flex flex-col items-center gap-1 ${currentView === 'home' ? 'text-red-500 border-b-2 border-red-500' : 'text-gray-400'}`}><Gamepad2 size={18} /> Matches</button>
                <button onClick={() => setCurrentView('my-tournaments')} className={`flex-1 py-3 text-xs font-bold flex flex-col items-center gap-1 ${currentView === 'my-tournaments' ? 'text-red-500 border-b-2 border-red-500' : 'text-gray-400'}`}><History size={18} /> My Games</button>
                <button onClick={() => setCurrentView('ai-coach')} className={`flex-1 py-3 text-xs font-bold flex flex-col items-center gap-1 ${currentView === 'ai-coach' ? 'text-yellow-500 border-b-2 border-yellow-500' : 'text-gray-400'}`}><Sparkles size={18} /> AI Coach</button>
                {user.isAdmin && <button onClick={() => setCurrentView('admin')} className={`flex-1 py-3 text-xs font-bold flex flex-col items-center gap-1 ${currentView === 'admin' ? 'text-blue-500 border-b-2 border-blue-500' : 'text-gray-400'}`}><Settings size={18} /> Admin</button>}
              </nav>

              <main className="max-w-md mx-auto p-4 pb-24">
                {currentView === 'home' && <HomeView active={isWebsiteActive} time={currentTime} list={tournaments} joined={joinedMatches} onJoin={id => setJoinedMatches([...joinedMatches, id])} />}
                {currentView === 'my-tournaments' && <MyTournamentsView list={tournaments} joined={joinedMatches} time={currentTime} />}
                {currentView === 'ai-coach' && <AICoachView />}
                {currentView === 'admin' && <AdminPanel list={tournaments} />}
              </main>
            </div>
          );
        }

        // --- VIEWS ---

        function HomeView({ active, time, list, joined, onJoin }) {
          if (!active) return (
            <div className="flex flex-col items-center justify-center h-[60vh] text-center p-6 bg-gray-900/30 rounded-3xl border border-gray-800">
              <Clock size={64} className="text-gray-700 mb-4 animate-pulse" />
              <h2 className="text-2xl font-bold text-gray-300">Registration Closed</h2>
              <p className="text-gray-500 mt-2">Bhai, matches dopahar <span className="text-red-500 font-bold">1:00 PM</span> se raat <span className="text-red-500 font-bold">11:00 PM</span> tak hi chalte hain.</p>
            </div>
          );
          return (
            <div className="space-y-4">
              <div className="bg-red-950/20 border border-red-900/30 p-3 rounded-xl flex items-center justify-between">
                <div className="flex items-center gap-2 text-red-500 text-xs font-bold"><div className="w-2 h-2 rounded-full bg-red-600 animate-ping"></div> TOURNAMENTS LIVE</div>
                <div className="text-xs font-mono text-gray-400">{time.toLocaleTimeString()}</div>
              </div>
              {list.length === 0 && <p className="text-center text-gray-500 py-10">Admin match add karega, tab dikhenge.</p>}
              {list.map(t => <MatchCard key={t.id} t={t} now={time} isJoined={joined.includes(t.id)} onJoin={onJoin} />)}
            </div>
          );
        }

        function MatchCard({ t, now, isJoined, onJoin }) {
          const [paying, setPaying] = useState(false);
          const showDetails = now.getHours() >= t.hour;
          const matchOver = now.getHours() > t.hour;

          return (
            <div className={`bg-gray-900 border ${isJoined ? 'border-green-600/50' : 'border-gray-800'} rounded-2xl overflow-hidden shadow-xl`}>
              <div className="p-4 bg-gray-800/50 flex justify-between items-center">
                <span className="font-black text-lg">{t.label} Match</span>
                {isJoined && <span className="bg-green-600/20 text-green-400 text-[10px] px-2 py-1 rounded-full font-bold uppercase tracking-widest">Joined ✅</span>}
              </div>
              <div className="p-4 space-y-4">
                <div className="grid grid-cols-2 gap-3 text-center">
                  <div className="bg-gray-950 p-2 rounded-xl border border-gray-800"><p className="text-[10px] text-gray-500 uppercase">Entry</p><p className="font-bold text-white">₹{t.fee}</p></div>
                  <div className="bg-gray-950 p-2 rounded-xl border border-gray-800"><p className="text-[10px] text-gray-500 uppercase">Win Prize</p><p className="font-bold text-yellow-500">₹{t.prize}</p></div>
                </div>
                {!isJoined ? (
                  <button onClick={() => setPaying(true)} disabled={matchOver} className={`w-full py-3 rounded-xl font-black text-sm uppercase ${matchOver ? 'bg-gray-800 text-gray-500 cursor-not-allowed' : 'bg-red-600 hover:bg-red-500 transition-all shadow-[0_4px_15px_rgba(220,38,38,0.3)]'}`}>
                    {matchOver ? 'Match Completed' : `Pay & Join (₹${t.fee})`}
                  </button>
                ) : (
                  <div className="bg-gray-950 p-3 rounded-xl border border-gray-800 space-y-2">
                    {showDetails ? (
                      <>
                        <p className="text-[10px] text-green-500 font-bold text-center uppercase tracking-tighter">Room ID & Password is Live!</p>
                        <div className="flex justify-between text-sm p-1"><span>Room ID:</span><span className="font-mono text-red-500 font-black">{t.roomId || 'Wait...'}</span></div>
                        <div className="flex justify-between text-sm p-1"><span>Pass:</span><span className="font-mono text-red-500 font-black">{t.roomPass || 'Wait...'}</span></div>
                      </>
                    ) : <div className="text-center py-2 text-xs text-gray-400 font-medium">Room ID precisely at {t.label} par dikhega.</div>}
                  </div>
                )}
              </div>
              {paying && <PaymentModal fee={t.fee} onClose={() => setPaying(false)} onConfirm={() => { onJoin(t.id); setPaying(false); }} />}
            </div>
          );
        }

        function PaymentModal({ fee, onClose, onConfirm }) {
          return (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center p-4 z-[100]">
              <div className="bg-gray-900 border border-gray-800 rounded-3xl w-full max-w-sm p-6 text-center space-y-5 animate-in zoom-in-95 duration-200">
                <h3 className="text-xl font-black italic">SCAN TO PAY ₹{fee}</h3>
                <div className="bg-white p-3 rounded-2xl inline-block mx-auto"><QrCode size={180} className="text-black" /></div>
                <p className="text-xs text-gray-500 font-mono">UPI ID: apexhub@ybl</p>
                <div className="space-y-3">
                  <button onClick={onConfirm} className="w-full bg-green-600 text-white font-black py-4 rounded-xl shadow-[0_5px_15px_rgba(22,163,74,0.3)] uppercase">I have paid ✅</button>
                  <button onClick={onClose} className="w-full text-gray-400 font-bold py-2 text-sm">Cancel</button>
                </div>
              </div>
            </div>
          );
        }

        function MyTournamentsView({ list, joined, time }) {
          const myGames = list.filter(t => joined.includes(t.id));
          if (myGames.length === 0) return <div className="text-center py-20 text-gray-500">Bhai abhi tak koi match join nahi kiya.</div>;
          return <div className="space-y-4"><h2 className="font-black italic text-gray-400 text-sm">HISTORY</h2>{myGames.map(t => <MatchCard key={t.id} t={t} now={time} isJoined={true} />)}</div>;
        }

        function AICoachView() {
          const [style, setStyle] = useState('');
          const [tip, setTip] = useState('');
          const [loading, setLoading] = useState(false);
          const askAI = async () => {
            if(!style) return;
            setLoading(true); setTip('');
            try {
              const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: `Short aggressive Free Fire pro strategy for ${style} style in Hinglish.` }] }] })
              });
              const data = await res.json();
              setTip(data.candidates?.[0]?.content?.parts?.[0]?.text || "Coach offline hai bhai.");
            } catch(e) { setTip("Server busy, baad me try karein."); }
            setLoading(false);
          };
          return (
            <div className="space-y-4">
              <div className="bg-yellow-600/10 border border-yellow-600/30 p-6 rounded-3xl text-center">
                <Bot size={48} className="mx-auto text-yellow-500 mb-2" />
                <h2 className="text-xl font-black text-yellow-500 italic">PRO AI COACH</h2>
                <p className="text-xs text-gray-500 mt-1 uppercase font-bold tracking-widest">Get Winning Strategies</p>
              </div>
              <div className="bg-gray-900 p-6 rounded-3xl border border-gray-800 space-y-4">
                <input type="text" placeholder="Playstyle (e.g. Rusher, Sniper)" value={style} onChange={e=>setStyle(e.target.value)} className="w-full bg-gray-950 border border-gray-700 p-4 rounded-xl text-white font-bold" />
                <button onClick={askAI} disabled={loading} className="w-full bg-yellow-600 text-black font-black py-4 rounded-xl uppercase transition-all hover:bg-yellow-500">{loading ? 'Analyzing...' : 'Generate Plan ✨'}</button>
                {tip && <div className="p-4 bg-gray-950 border border-yellow-600/20 rounded-xl text-sm text-gray-300 leading-relaxed italic">{tip}</div>}
              </div>
            </div>
          );
        }

        function AdminPanel({ list }) {
          const [match, setMatch] = useState({ hour: 13, label: '1:00 PM', fee: 20, prize: 200, roomId: '', roomPass: '' });
          const create = async () => {
            try {
              await addDoc(collection(db, 'tournaments'), { ...match, hour: Number(match.hour), fee: Number(match.fee), prize: Number(match.prize) });
              alert("Tournament Created!");
            } catch(e) { alert("Error!"); }
          };
          return (
            <div className="space-y-6">
              <div className="bg-blue-600/10 border border-blue-600/30 p-4 rounded-2xl text-center"><h2 className="font-black text-blue-500 italic">CONTROL CENTER</h2></div>
              <div className="bg-gray-900 p-4 rounded-3xl border border-gray-800 space-y-4">
                <div className="grid grid-cols-2 gap-2 text-xs">
                  <input type="number" placeholder="Hour (13-23)" onChange={e=>setMatch({...match, hour: e.target.value})} className="bg-gray-950 border border-gray-700 p-3 rounded-lg" />
                  <input type="text" placeholder="Label (1:00 PM)" onChange={e=>setMatch({...match, label: e.target.value})} className="bg-gray-950 border border-gray-700 p-3 rounded-lg" />
                  <input type="number" placeholder="Fee" onChange={e=>setMatch({...match, fee: e.target.value})} className="bg-gray-950 border border-gray-700 p-3 rounded-lg" />
                  <input type="number" placeholder="Prize" onChange={e=>setMatch({...match, prize: e.target.value})} className="bg-gray-950 border border-gray-700 p-3 rounded-lg" />
                </div>
                <button onClick={create} className="w-full bg-blue-600 py-3 rounded-xl font-black uppercase text-sm">Add New Tournament</button>
              </div>
              <div className="space-y-2">
                <h3 className="text-xs font-bold text-gray-500 uppercase px-2">Live Controls</h3>
                {list.map(t => (
                  <div key={t.id} className="bg-gray-900 p-3 rounded-xl border border-gray-800 flex flex-col gap-2">
                    <div className="flex justify-between items-center text-xs font-bold"><span>{t.label} Match</span> <button onClick={()=>deleteDoc(doc(db, 'tournaments', t.id))} className="text-red-500"><Trash2 size={16}/></button></div>
                    <div className="flex gap-2">
                      <input type="text" placeholder="Room ID" className="flex-1 bg-gray-950 border border-gray-700 text-[10px] p-2 rounded" onBlur={e=>updateDoc(doc(db, 'tournaments', t.id), {roomId: e.target.value})} defaultValue={t.roomId} />
                      <input type="text" placeholder="Pass" className="flex-1 bg-gray-950 border border-gray-700 text-[10px] p-2 rounded" onBlur={e=>updateDoc(doc(db, 'tournaments', t.id), {roomPass: e.target.value})} defaultValue={t.roomPass} />
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        }

        function AuthScreen({ onLogin }) {
          const [id, setId] = useState('');
          const [pw, setPw] = useState('');
          return (
            <div className="min-h-screen bg-gray-950 flex flex-col items-center justify-center p-6">
              <div className="w-full max-w-sm space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <div className="text-center space-y-2">
                  <div className="bg-red-600 p-4 rounded-3xl inline-block shadow-[0_0_30px_rgba(220,38,38,0.4)] border border-red-400/50"><Gamepad2 size={48} /></div>
                  <h1 className="text-4xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500">APEX HUB</h1>
                  <p className="text-xs text-gray-500 font-bold uppercase tracking-[0.2em]">Tournament Platform</p>
                </div>
                <div className="bg-gray-900 border border-gray-800 p-6 rounded-[2.5rem] shadow-2xl space-y-4">
                  <div className="space-y-4">
                    <input type="text" placeholder="WhatsApp / Mobile" onChange={e=>setId(e.target.value)} className="w-full bg-gray-950 border border-gray-800 p-4 rounded-2xl text-white font-bold focus:border-red-600 outline-none transition-all" />
                    <input type="password" placeholder="Password" onChange={e=>setPw(e.target.value)} className="w-full bg-gray-950 border border-gray-800 p-4 rounded-2xl text-white font-bold focus:border-red-600 outline-none transition-all" />
                  </div>
                  <button onClick={() => onLogin({name: id, isAdmin: id === 'admin' && pw === 'admin'})} className="w-full bg-red-600 text-white font-black py-4 rounded-2xl shadow-[0_4px_20px_rgba(220,38,38,0.4)] hover:bg-red-500 transition-all uppercase italic">Login to Arena</button>
                  <p className="text-[10px] text-center text-gray-600 font-bold uppercase">Developed for Free Fire Pros</p>
                </div>
              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>


```
