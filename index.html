```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Gaming Hub - Tournaments</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0",
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
      }
    </script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-950 text-white selection:bg-orange-500/30">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Gamepad2, Clock, History, LogOut, Sparkles, Bot, Settings, Trash2, CheckCircle2, XCircle, AlertCircle, BookOpen, ShieldAlert } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc } from 'firebase/firestore';

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
          apiKey: "AIzaSyDzBQO4rlXQV5jTZzLopFp_WSvgSA_r5PQ",
          authDomain: "apex-hub-1eee0.firebaseapp.com",
          projectId: "apex-hub-1eee0",
          storageBucket: "apex-hub-1eee0.firebasestorage.app",
          messagingSenderId: "233220398385",
          appId: "1:233220398385:web:83e623ab96dbb6130da410",
          measurementId: "G-RHLDYCWM54"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function App() {
          const [user, setUser] = useState(() => {
              const savedUser = localStorage.getItem('apex_user_session');
              return savedUser ? JSON.parse(savedUser) : null;
          }); 
          
          const [firebaseUser, setFirebaseUser] = useState(null);
          const [currentView, setCurrentView] = useState('home');
          const [currentTime, setCurrentTime] = useState(new Date());
          const [tournaments, setTournaments] = useState([]);
          const [registrations, setRegistrations] = useState([]);

          const handleLogout = () => {
              localStorage.removeItem('apex_user_session');
              setUser(null);
          };

          const handleLogin = (userData) => {
              localStorage.setItem('apex_user_session', JSON.stringify(userData));
              setUser(userData);
          };

          useEffect(() => {
            const timer = setInterval(() => setCurrentTime(new Date()), 1000);
            return () => clearInterval(timer);
          }, []);

          useEffect(() => {
            signInAnonymously(auth).catch(err => console.error("Auth Error:", err));
            const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
              if (u) {
                setFirebaseUser(u);
                
                const unsubTournaments = onSnapshot(collection(db, 'tournaments'), (snapshot) => {
                  const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                  data.sort((a, b) => a.hour - b.hour);
                  setTournaments(data);
                }, (error) => {
                  if(error.code === 'permission-denied') {
                      alert("Database Error: Firebase me 'Rules' check karo, 'if true;' hona chahiye.");
                  }
                });

                const unsubRegistrations = onSnapshot(collection(db, 'registrations'), (snapshot) => {
                  const regData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                  setRegistrations(regData);
                });
                return () => { unsubTournaments(); unsubRegistrations(); };
              }
            });
            return () => unsubscribeAuth();
          }, []);

          const currentHour = currentTime.getHours();
          const isWebsiteActive = currentHour >= 13 && currentHour <= 23; 

          if (!user || !firebaseUser) return <AuthScreen onLogin={handleLogin} />;

          return (
            <div className="min-h-screen bg-gray-950 text-gray-100 font-sans">
              <header className="bg-gray-900 border-b border-orange-900/50 p-4 sticky top-0 z-50">
                <div className="max-w-md mx-auto flex items-center justify-between">
                  <div className="flex items-center gap-3 cursor-pointer" onClick={() => setCurrentView('home')}>
                    <img src="./1000087916.webp" alt="Apex Hub Logo" className="w-12 h-12 rounded-lg object-cover shadow-[0_0_15px_rgba(249,115,22,0.4)] border border-orange-500/50" onError={(e) => e.target.outerHTML = '<div class="bg-orange-600 p-2 rounded-lg"><Gamepad2 size={24} class="text-white"/></div>'} />
                    <div>
                      <h1 className="text-xl font-black text-transparent bg-clip-text bg-gradient-to-r from-orange-500 to-yellow-500 tracking-tight">APEX GAMING HUB</h1>
                      <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Esports Arena</p>
                    </div>
                  </div>
                  <div className="flex items-center gap-2">
                    {user.isAdmin && <span className="bg-yellow-500 text-black text-[10px] font-black px-2 py-1 rounded">ADMIN</span>}
                    <button onClick={handleLogout} className="p-2 text-gray-400 hover:text-orange-500 transition-colors"><LogOut size={20} /></button>
                  </div>
                </div>
              </header>

              <nav className="max-w-md mx-auto flex border-b border-gray-800 bg-gray-900/80 sticky top-[73px] z-40 backdrop-blur-md overflow-x-auto scrollbar-hide">
                <button onClick={() => setCurrentView('home')} className={`min-w-[80px] flex-1 py-3 text-[10px] font-black uppercase flex flex-col items-center gap-1 ${currentView === 'home' ? 'text-orange-500 border-b-2 border-orange-500' : 'text-gray-400'}`}><Gamepad2 size={18} /> Matches</button>
                <button onClick={() => setCurrentView('my-tournaments')} className={`min-w-[80px] flex-1 py-3 text-[10px] font-black uppercase flex flex-col items-center gap-1 ${currentView === 'my-tournaments' ? 'text-orange-500 border-b-2 border-orange-500' : 'text-gray-400'}`}><History size={18} /> My Games</button>
                <button onClick={() => setCurrentView('rules')} className={`min-w-[80px] flex-1 py-3 text-[10px] font-black uppercase flex flex-col items-center gap-1 ${currentView === 'rules' ? 'text-red-500 border-b-2 border-red-500' : 'text-gray-400'}`}><BookOpen size={18} /> Rules</button>
                <button onClick={() => setCurrentView('ai-coach')} className={`min-w-[80px] flex-1 py-3 text-[10px] font-black uppercase flex flex-col items-center gap-1 ${currentView === 'ai-coach' ? 'text-yellow-500 border-b-2 border-yellow-500' : 'text-gray-400'}`}><Sparkles size={18} /> AI Coach</button>
                {user.isAdmin && <button onClick={() => setCurrentView('admin')} className={`min-w-[80px] flex-1 py-3 text-[10px] font-black uppercase flex flex-col items-center gap-1 relative ${currentView === 'admin' ? 'text-blue-500 border-b-2 border-blue-500' : 'text-gray-400'}`}>
                    <Settings size={18} /> Admin
                    {registrations.filter(r => r.status === 'pending').length > 0 && <span className="absolute top-2 right-4 w-2 h-2 bg-red-500 rounded-full animate-ping"></span>}
                </button>}
              </nav>

              <main className="max-w-md mx-auto p-4 pb-24">
                {currentView === 'home' && <HomeView active={isWebsiteActive} time={currentTime} list={tournaments} regs={registrations} user={user} fbUser={firebaseUser} />}
                {currentView === 'my-tournaments' && <MyTournamentsView list={tournaments} regs={registrations} fbUser={firebaseUser} time={currentTime} />}
                {currentView === 'rules' && <RulesView />}
                {currentView === 'ai-coach' && <AICoachView />}
                {currentView === 'admin' && <AdminPanel list={tournaments} regs={registrations} />}
              </main>
            </div>
          );
        }

        // --- VIEWS ---

        function HomeView({ active, time, list, regs, user, fbUser }) {
          if (!active) return (
            <div className="flex flex-col items-center justify-center h-[60vh] text-center p-6 bg-gray-900/30 rounded-3xl border border-gray-800">
              <Clock size={64} className="text-gray-700 mb-4 animate-pulse" />
              <h2 className="text-2xl font-bold text-gray-300">Arena is Closed</h2>
              <p className="text-gray-500 mt-2">Bhai, matches dopahar <span className="text-orange-500 font-bold">1:00 PM</span> se raat <span className="text-orange-500 font-bold">11:00 PM</span> tak hi chalte hain.</p>
            </div>
          );
          return (
            <div className="space-y-4">
              <div className="bg-orange-950/20 border border-orange-900/30 p-3 rounded-xl flex items-center justify-between shadow-inner">
                <div className="flex items-center gap-2 text-orange-500 text-xs font-bold"><div className="w-2 h-2 rounded-full bg-orange-600 animate-ping"></div> TOURNAMENTS LIVE</div>
                <div className="text-xs font-mono text-gray-400 bg-gray-900 px-2 py-1 rounded">{time.toLocaleTimeString()}</div>
              </div>
              {list.length === 0 && <p className="text-center text-gray-500 py-10 font-medium">Matches are being scheduled by Admin...</p>}
              {list.map(t => <MatchCard key={t.id} t={t} now={time} user={user} fbUser={fbUser} regs={regs} />)}
            </div>
          );
        }

        function MatchCard({ t, now, user, fbUser, regs }) {
          const [paying, setPaying] = useState(false);
          const showDetails = now.getHours() >= t.hour;
          const matchOver = now.getHours() > t.hour;

          const myReg = regs.find(r => r.matchId === t.id && r.userId === fbUser.uid);
          const isPending = myReg?.status === 'pending';
          const isApproved = myReg?.status === 'approved';

          const handleJoinRequest = async (regData) => {
            if(!regData.utr || !regData.ign || !regData.uid) return alert("Bhai, saari details bharna zaroori hai!");
            try {
              await addDoc(collection(db, 'registrations'), {
                matchId: t.id,
                matchLabel: t.label,
                userId: fbUser.uid,
                phone: user.name,
                utr: regData.utr,
                ign: regData.ign,
                gameUid: regData.uid,
                status: 'pending',
                timestamp: Date.now()
              });
              setPaying(false);
            } catch(e) { alert("Network error! Try again."); }
          };

          return (
            <div className={`bg-gray-900 border ${isApproved ? 'border-green-600/50' : isPending ? 'border-yellow-600/50' : 'border-gray-800 hover:border-gray-700'} transition-all rounded-2xl overflow-hidden shadow-xl`}>
              <div className="p-4 bg-gradient-to-r from-gray-800/80 to-gray-900 flex justify-between items-center border-b border-gray-800">
                <span className="font-black text-lg text-white tracking-wide">{t.label} Match</span>
                {isApproved && <span className="bg-green-600/20 text-green-400 text-[10px] px-2 py-1 rounded border border-green-600/30 font-bold uppercase tracking-widest">Joined ✅</span>}
                {isPending && <span className="bg-yellow-600/20 text-yellow-500 text-[10px] px-2 py-1 rounded border border-yellow-600/30 font-bold uppercase tracking-widest">Pending ⏳</span>}
              </div>
              <div className="p-4 space-y-4">
                <div className="grid grid-cols-2 gap-3 text-center">
                  <div className="bg-gray-950 p-2 rounded-xl border border-gray-800"><p className="text-[10px] text-gray-500 uppercase font-bold tracking-wider">Entry Fee</p><p className="font-black text-white text-lg">₹{t.fee}</p></div>
                  <div className="bg-gray-950 p-2 rounded-xl border border-gray-800"><p className="text-[10px] text-gray-500 uppercase font-bold tracking-wider">Win Prize</p><p className="font-black text-orange-400 text-lg">₹{t.prize}</p></div>
                </div>

                {!myReg && (
                  <button onClick={() => setPaying(true)} disabled={matchOver} className={`w-full py-3.5 rounded-xl font-black text-sm uppercase tracking-wider ${matchOver ? 'bg-gray-800 text-gray-500 cursor-not-allowed' : 'bg-orange-600 hover:bg-orange-500 text-white transition-all shadow-[0_0_15px_rgba(249,115,22,0.3)]'}`}>
                    {matchOver ? 'Match Completed' : `Pay & Join Now`}
                  </button>
                )}

                {isPending && (
                   <div className="bg-yellow-950/20 p-4 rounded-xl border border-yellow-800/50 text-center space-y-2">
                       <AlertCircle size={28} className="mx-auto text-yellow-500 animate-bounce" />
                       <p className="text-sm text-yellow-400 font-black uppercase">Waiting for Approval ⏳</p>
                       <p className="text-xs text-gray-400">Aapka payment verify ho raha hai. Admin ke approve karte hi Room ID yahan dikhega.</p>
                   </div>
                )}

                {isApproved && (
                  <div className="bg-gray-950 p-4 rounded-xl border border-gray-800 shadow-inner">
                    {showDetails ? (
                      <div className="space-y-3">
                        <p className="text-xs text-green-500 font-black text-center uppercase tracking-widest border-b border-gray-800 pb-2">Room is Live!</p>
                        <div className="flex justify-between items-center bg-gray-900 p-2 rounded border border-gray-800"><span className="text-xs text-gray-400 font-bold">Room ID</span><span className="font-mono text-orange-400 font-black text-lg">{t.roomId || 'Wait...'}</span></div>
                        <div className="flex justify-between items-center bg-gray-900 p-2 rounded border border-gray-800"><span className="text-xs text-gray-400 font-bold">Password</span><span className="font-mono text-orange-400 font-black text-lg">{t.roomPass || 'Wait...'}</span></div>
                      </div>
                    ) : <div className="text-center py-4 text-sm text-gray-400 font-bold">Room details will be revealed exactly at <span className="text-orange-400">{t.label}</span></div>}
                  </div>
                )}
              </div>
              {paying && <PaymentModal fee={t.fee} onClose={() => setPaying(false)} onConfirm={handleJoinRequest} />}
            </div>
          );
        }

        function PaymentModal({ fee, onClose, onConfirm }) {
          const [data, setData] = useState({ ign: '', uid: '', utr: '' });
          const [loading, setLoading] = useState(false);

          const submitForm = async () => {
              setLoading(true);
              await onConfirm(data);
              setLoading(false);
          };

          return (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-[100] overflow-y-auto">
              <div className="bg-gray-900 border border-gray-700 rounded-3xl w-full max-w-sm p-6 space-y-5 animate-in zoom-in-95 duration-200 my-8">
                <div className="text-center space-y-2 border-b border-gray-800 pb-4">
                  <h3 className="text-2xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-yellow-400">PAY ₹{fee} TO JOIN</h3>
                  <p className="text-xs text-gray-400 font-bold uppercase">Scan QR Code Below</p>
                </div>
                
                <div className="bg-white p-2 rounded-2xl w-48 h-48 mx-auto flex items-center justify-center overflow-hidden">
                    <img src="./1000087879.jpg" alt="Payment QR" className="w-full h-full object-cover" onError={(e) => e.target.outerHTML = '<div class="text-black text-center font-bold text-xs">Upload 1000087879.jpg to GitHub</div>'} />
                </div>
                <p className="text-center text-xs text-gray-500 font-mono font-bold bg-gray-950 py-2 rounded-lg border border-gray-800">UPI: apexhub@ybl</p>
                
                <div className="space-y-3 pt-2">
                    <div className="space-y-1">
                        <label className="text-[10px] text-orange-400 uppercase font-black ml-1">In-Game Name (IGN)</label>
                        <input type="text" value={data.ign} onChange={e=>setData({...data, ign: e.target.value})} placeholder="e.g. APEX Vinyak" className="w-full bg-gray-950 border border-gray-700 p-3 rounded-xl text-white text-sm font-bold placeholder-gray-600 focus:border-orange-500 outline-none" />
                    </div>
                    <div className="space-y-1">
                        <label className="text-[10px] text-orange-400 uppercase font-black ml-1">Game UID</label>
                        <input type="number" value={data.uid} onChange={e=>setData({...data, uid: e.target.value})} placeholder="e.g. 1234567890" className="w-full bg-gray-950 border border-gray-700 p-3 rounded-xl text-white text-sm font-bold placeholder-gray-600 focus:border-orange-500 outline-none" />
                    </div>
                    <div className="space-y-1">
                        <label className="text-[10px] text-orange-400 uppercase font-black ml-1">Payment UTR / Ref No.</label>
                        <input type="text" value={data.utr} onChange={e=>setData({...data, utr: e.target.value})} placeholder="12 Digit UTR Number" className="w-full bg-gray-950 border border-gray-700 p-3 rounded-xl text-white text-sm font-bold placeholder-gray-600 focus:border-orange-500 outline-none" />
                    </div>
                </div>

                <div className="space-y-3 pt-4">
                  <button onClick={submitForm} disabled={loading} className={`w-full text-white font-black py-4 rounded-xl shadow-[0_0_15px_rgba(22,163,74,0.4)] uppercase tracking-wider transition-colors ${loading ? 'bg-gray-600 cursor-not-allowed' : 'bg-green-600 hover:bg-green-500'}`}>
                      {loading ? 'Processing...' : 'Submit Details ✅'}
                  </button>
                  <button onClick={onClose} disabled={loading} className="w-full text-gray-400 font-bold py-2 text-sm uppercase hover:text-white transition-colors">Cancel</button>
                </div>
              </div>
            </div>
          );
        }

        function RulesView() {
            return (
                <div className="space-y-4">
                    <div className="bg-red-950/30 border border-red-900/50 p-6 rounded-3xl text-center shadow-lg">
                        <ShieldAlert size={48} className="mx-auto text-red-500 mb-3" />
                        <h2 className="text-2xl font-black text-red-500 uppercase tracking-widest">Arena Rules</h2>
                        <p className="text-xs text-gray-400 mt-1 font-bold uppercase">Read Carefully Before Joining</p>
                    </div>
                    <div className="bg-gray-900 border border-gray-800 rounded-3xl p-6 space-y-6 shadow-xl">
                        <div className="space-y-2">
                            <h3 className="text-lg font-black text-white flex items-center gap-2"><span className="bg-orange-500 text-black w-6 h-6 rounded flex items-center justify-center text-sm">1</span> Fair Play Enforcement</h3>
                            <p className="text-sm text-gray-400 leading-relaxed font-medium pl-8">
                                <span className="text-orange-400 font-bold">No Teaming Up & No Revive.</span> Strict solo gameplay must be maintained. Any players caught teaming up or reviving will be immediately disqualified without warnings.
                            </p>
                        </div>
                        <div className="space-y-2">
                            <h3 className="text-lg font-black text-white flex items-center gap-2"><span className="bg-orange-500 text-black w-6 h-6 rounded flex items-center justify-center text-sm">2</span> Zero Tolerance for Hacks</h3>
                            <p className="text-sm text-gray-400 leading-relaxed font-medium pl-8">
                                <span className="text-red-400 font-bold">No Panel Users Allowed.</span> The use of scripts, panels, or any third-party modifications is strictly prohibited. Violators will face a permanent ban from Apex Gaming Hub.
                            </p>
                        </div>
                        <div className="space-y-2">
                            <h3 className="text-lg font-black text-white flex items-center gap-2"><span className="bg-orange-500 text-black w-6 h-6 rounded flex items-center justify-center text-sm">3</span> Refund Policy</h3>
                            <p className="text-sm text-gray-400 leading-relaxed font-medium pl-8">
                                In the event that a participant successfully completes the payment but is <span className="text-white font-bold">unable to join the tournament room</span> due to technical issues or full capacity, a <span className="text-green-400 font-bold">50% refund</span> of the entry fee will be initiated back to the original payment source.
                            </p>
                        </div>
                    </div>
                </div>
            )
        }

        function MyTournamentsView({ list, regs, fbUser, time }) {
          const myRegs = regs.filter(r => r.userId === fbUser.uid);
          const myMatchIds = myRegs.map(r => r.matchId);
          const myGames = list.filter(t => myMatchIds.includes(t.id));
          
          if (myGames.length === 0) return <div className="text-center py-20 text-gray-500 font-medium">No match history found.</div>;
          return <div className="space-y-4"><h2 className="font-black text-gray-400 text-sm pl-2">MY MATCHES</h2>{myGames.map(t => <MatchCard key={t.id} t={t} now={time} fbUser={fbUser} regs={regs} />)}</div>;
        }

        function AICoachView() {
          const [style, setStyle] = useState('');
          const [tip, setTip] = useState('');
          const [loading, setLoading] = useState(false);
          const askAI = async () => {
            if(!style) return;
            setLoading(true); setTip('');
            try {
              const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: `Short aggressive Free Fire pro strategy for ${style} style in Hinglish.` }] }] })
              });
              const data = await res.json();
              setTip(data.candidates?.[0]?.content?.parts?.[0]?.text || "Coach offline hai bhai.");
            } catch(e) { setTip("Server busy, baad me try karein."); }
            setLoading(false);
          };
          return (
            <div className="space-y-4">
              <div className="bg-gradient-to-b from-yellow-900/40 to-gray-900 border border-yellow-700/50 p-6 rounded-3xl text-center shadow-lg">
                <Bot size={56} className="mx-auto text-yellow-500 mb-3 drop-shadow-[0_0_10px_rgba(234,179,8,0.5)]" />
                <h2 className="text-2xl font-black text-yellow-500 uppercase tracking-widest">AI Pro Coach</h2>
              </div>
              <div className="bg-gray-900 p-6 rounded-3xl border border-gray-800 space-y-4 shadow-xl">
                <input type="text" placeholder="Playstyle (e.g. Rusher, Sniper)" value={style} onChange={e=>setStyle(e.target.value)} className="w-full bg-gray-950 border border-gray-700 p-4 rounded-xl text-white font-bold outline-none focus:border-yellow-500" />
                <button onClick={askAI} disabled={loading} className="w-full bg-yellow-600 text-black font-black py-4 rounded-xl uppercase tracking-wider hover:bg-yellow-500 shadow-[0_0_15px_rgba(202,138,4,0.4)]">{loading ? 'Analyzing Data...' : 'Generate Tactic ✨'}</button>
                {tip && <div className="p-5 bg-gray-950 border border-yellow-600/30 rounded-xl text-sm text-gray-300 leading-relaxed font-medium">{tip}</div>}
              </div>
            </div>
          );
        }

        function AdminPanel({ list, regs }) {
          const [match, setMatch] = useState({ hour: 13, label: '1:00 PM', fee: 20, prize: 200, roomId: '', roomPass: '' });
          const pendingRegs = regs.filter(r => r.status === 'pending');

          const create = async () => {
            try {
              await addDoc(collection(db, 'tournaments'), { ...match, hour: Number(match.hour), fee: Number(match.fee), prize: Number(match.prize) });
              alert("Tournament Created!");
            } catch(e) { alert("Error!"); }
          };

          const handleApproval = async (regId, isApprove) => {
             try {
                 if(isApprove) {
                     await updateDoc(doc(db, 'registrations', regId), { status: 'approved' });
                 } else {
                     await deleteDoc(doc(db, 'registrations', regId)); 
                 }
             } catch(e) { alert("Action failed!"); }
          };

          return (
            <div className="space-y-8 pb-10">
              
              <div className="space-y-4">
                <div className="bg-red-950/30 border border-red-900/50 p-4 rounded-2xl flex items-center justify-between shadow-lg">
                    <h2 className="font-black text-red-500 tracking-widest uppercase">Approvals</h2>
                    <span className="bg-red-600 text-white text-xs px-3 py-1 rounded-full font-black shadow-[0_0_10px_rgba(220,38,38,0.6)]">{pendingRegs.length} Pending</span>
                </div>
                {pendingRegs.length === 0 ? (
                    <p className="text-center text-sm text-gray-600 py-6 font-bold">No pending payments.</p>
                ) : (
                    pendingRegs.map(r => (
