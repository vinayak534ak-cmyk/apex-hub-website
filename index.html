```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apex Hub - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0",
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
      }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; margin: 0; padding: 0; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .text-gold { color: #facc15; }
        .bg-gold { background: #facc15; }
        .border-gold { border-color: #facc15; }
        .btn-engage { background: #facc15; color: #000; font-weight: 900; transition: all 0.2s; }
        .btn-engage:active { transform: scale(0.96); }
        .slot-progress { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Gamepad2, Trophy, ShieldAlert, LogOut, Settings, Trash2, Users, User, CheckCircle2, Calendar, Target, Smartphone, Key, Info } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously } from 'firebase/auth';
        import { getFirestore, collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc, getDocs } from 'firebase/firestore';

        // Firebase Config as per your project
        const firebaseConfig = {
          apiKey: "AIzaSyDzBQO4rlXQV5jTZzLopFp_WSvgSA_r5PQ",
          authDomain: "apex-hub-1eee0.firebaseapp.com",
          projectId: "apex-hub-1eee0",
          storageBucket: "apex-hub-1eee0.firebasestorage.app",
          messagingSenderId: "233220398385",
          appId: "1:233220398385:web:83e623ab96dbb6130da410"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const dbVersion = "Apex_Master_Final";

        function App() {
          const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('apex_auth_vfinal') || 'null'));
          const [isFirstTime, setIsFirstTime] = useState(false);
          const [view, setView] = useState('tournaments'); // tournaments, mygames, rewards, rules, admin
          const [matchTab, setMatchTab] = useState('SOLO CS');
          
          const [matches, setMatches] = useState([]);
          const [regs, setRegs] = useState([]);
          const [allUsers, setAllUsers] = useState([]);

          useEffect(() => {
            signInAnonymously(auth);
            const unsubT = onSnapshot(collection(db, 'artifacts', dbVersion, 'matches'), s => setMatches(s.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>a.hour - b.hour)));
            const unsubR = onSnapshot(collection(db, 'artifacts', dbVersion, 'regs'), s => setRegs(s.docs.map(d=>({id:d.id, ...d.data()}))));
            const unsubU = onSnapshot(collection(db, 'artifacts', dbVersion, 'users'), s => setAllUsers(s.docs.map(d=>({id:d.id, ...d.data()}))));
            return () => { unsubT(); unsubR(); unsubU(); };
          }, []);

          const handleLogin = (u, fresh) => {
            if(fresh) { setUser(u); setIsFirstTime(true); }
            else { localStorage.setItem('apex_auth_vfinal', JSON.stringify(u)); setUser(u); }
          };

          const handleLogout = () => { localStorage.removeItem('apex_auth_vfinal'); setUser(null); };

          if (!user) return <LoginScreen onAuth={handleLogin} allUsers={allUsers} />;
          
          if (isFirstTime) return <SetupProfile user={user} onComplete={(full) => {
            addDoc(collection(db, 'artifacts', dbVersion, 'users'), { ...full, isAdmin: false, lastLogin: '', streak: [] });
            localStorage.setItem('apex_auth_vfinal', JSON.stringify(full));
            setUser(full);
            setIsFirstTime(false);
          }} />;

          return (
            <div className="min-h-screen flex flex-col max-w-md mx-auto bg-[#050505] border-x border-[#111] shadow-2xl relative">
              {/* Header */}
              <header className="p-4 flex justify-between items-center bg-[#050505] border-b border-[#111] sticky top-0 z-50">
                <div className="flex items-center gap-2">
                  <div className="bg-gold p-1.5 rounded text-black shadow-lg"><Target size={18} strokeWidth={3}/></div>
                  <h1 className="text-xl font-black italic tracking-tighter uppercase">APEX HUB</h1>
                </div>
                <button onClick={handleLogout} className="p-2 bg-[#111] rounded-lg text-gray-500 hover:text-red-500"><LogOut size={16}/></button>
              </header>

              {/* Tabs */}
              <div className="flex bg-[#050505] border-b border-[#111] sticky top-[61px] z-40">
                <button onClick={()=>setView('tournaments')} className={`flex-1 py-4 text-[10px] font-black uppercase tracking-widest ${view==='tournaments'?'text-gold border-b-2 border-gold':'text-gray-500'}`}>Tournaments</button>
                <button onClick={()=>setView('mygames')} className={`flex-1 py-4 text-[10px] font-black uppercase tracking-widest ${view==='mygames'?'text-gold border-b-2 border-gold':'text-gray-500'}`}>My Tournaments</button>
              </div>

              {/* Main Content */}
              <main className="flex-1 p-5 pb-24 overflow-y-auto scrollbar-hide">
                {view === 'tournaments' && <TournamentView matches={matches} regs={regs} tab={matchTab} setTab={setMatchTab} user={user} db={db} />}
                {view === 'mygames' && <MyGamesView list={matches} regs={regs} user={user} />}
                {view === 'rewards' && <RewardsView user={user} players={allUsers} db={db} />}
                {view === 'rules' && <RulesView />}
                {view === 'admin' && <AdminView matches={matches} regs={regs} players={allUsers} db={db} />}
              </main>

              {/* Bottom Bar */}
              <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-[#050505] border-t border-[#111] flex justify-around p-3 z-50">
                <NavIcon active={view==='tournaments'} icon={<Gamepad2 size={22}/>} onClick={()=>setView('tournaments')} />
                <NavIcon active={view==='mygames'} icon={<Trophy size={22}/>} onClick={()=>setView('mygames')} />
                <NavIcon active={view==='rewards'} icon={<Calendar size={22}/>} onClick={()=>setView('rewards')} />
                <NavIcon active={view==='rules'} icon={<ShieldAlert size={22}/>} onClick={()=>setView('rules')} />
                {user.isAdmin && <NavIcon active={view==='admin'} icon={<Settings size={22}/>} onClick={()=>setView('admin')} />}
              </nav>
            </div>
          );
        }

        const NavIcon = ({ active, icon, onClick }) => (
          <button onClick={onClick} className={`p-2 transition-all ${active ? 'text-gold scale-125' : 'text-gray-600'}`}>{icon}</button>
        );

        function TournamentView({ matches, regs, tab, setTab, user, db }) {
          const list = matches.filter(m => m.mode === tab);
          return (
            <div className="space-y-6">
              <div className="space-y-1">
                <p className="text-gold font-black italic text-[10px] tracking-widest">// TODAY'S BATTLEFIELD</p>
                <h2 className="text-3xl font-black uppercase leading-none">BOOYAH O'CLOCK — <span className="text-gold">PICK YOUR SLOT</span></h2>
              </div>
              <div className="flex gap-2 overflow-x-auto scrollbar-hide pb-2">
                {['SOLO CS', 'SQUAD CS'].map(t => (
                  <button key={t} onClick={()=>setTab(t)} className={`px-6 py-2 rounded text-[10px] font-black uppercase border tracking-tighter ${tab===t?'bg-gold text-black border-gold shadow-lg shadow-gold/20':'bg-[#111] text-gray-500 border-[#222]'}`}>{t}</button>
                ))}
              </div>
              <div className="space-y-5">
                {list.map(m => <MatchCard key={m.id} m={m} user={user} regs={regs} db={db} />)}
              </div>
            </div>
          );
        }

        function MatchCard({ m, user, regs, db }) {
          const [modal, setModal] = useState(false);
          const [load, setLoad] = useState(false);
          const [sq, setSq] = useState(['', '', '', '']);
          
          const myReg = regs.find(r => r.matchId === m.id && r.mobile === user.mobile);
          const approved = regs.filter(r => r.matchId === m.id && r.status === 'approved').length;
          const progress = (approved / m.slots) * 100;
          const isLive = new Date().getHours() >= m.hour;

          const handleJoin = async (utr) => {
            if(!utr) return alert("UTR Number is required!");
            setLoad(true);
            try {
              await addDoc(collection(db, 'artifacts', dbVersion, 'regs'), {
                matchId: m.id, mobile: user.mobile, ign: user.ign, uid: user.uid, utr,
                status: 'pending', time: Date.now(), label: m.label, mode: m.mode,
                squad: m.mode === 'SQUAD CS' ? sq : null
              });
              setModal(false);
            } catch(e) { alert("Error!"); }
            setLoad(false);
          };

          return (
            <div className="bg-[#0a0a0a] border border-[#1a1a1a] rounded-2xl overflow-hidden shadow-xl">
              <div className="p-5 flex justify-between items-center bg-[#0d0d0d]">
                <div><h3 className="text-2xl font-black italic uppercase leading-none">{m.label}</h3><p className="text-[9px] text-gray-500 font-bold uppercase mt-1 tracking-widest">{m.mode}</p></div>
                {myReg ? (
                   myReg.status === 'approved' ? <span className="bg-green-600 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Joined ✅</span> : 
                   <span className="bg-[#1a1a1a] text-gray-500 text-[9px] font-black px-3 py-1 rounded-full uppercase italic animate-pulse">Pending...</span>
                ) : (approved >= m.slots ? <span className="bg-red-600/10 text-red-500 text-[9px] font-black px-3 py-1 rounded-full uppercase">Full Arena</span> : <span className="text-gold text-[9px] font-black uppercase tracking-widest">Enrollment Open</span>)}
              </div>

              <div className="p-5 space-y-4">
                <div className="space-y-1.5">
                  <div className="flex justify-between text-[9px] font-black uppercase text-gray-500"><span>Slots Filled</span><span>{approved} / {m.slots}</span></div>
                  <div className="w-full h-1.5 bg-[#111] rounded-full overflow-hidden border border-[#222] p-0.5">
                    <div className="h-full bg-gold rounded-full slot-progress shadow-[0_0_10px_rgba(250,204,21,0.5)]" style={{width: `${progress}%`}}></div>
                  </div>
                </div>

                <div className="grid grid-cols-2 gap-3 text-center">
                  <div className="bg-[#080808] p-2 rounded-xl border border-[#111] shadow-inner"><p className="text-[8px] text-gray-600 font-bold uppercase">Prize</p><p className="text-gold font-black text-lg italic tracking-tighter">₹{m.prize}</p></div>
                  <div className="bg-[#080808] p-2 rounded-xl border border-[#111] shadow-inner"><p className="text-[8px] text-gray-600 font-bold uppercase">Entry</p><p className="text-gold font-black text-lg italic tracking-tighter">₹{m.fee}</p></div>
                </div>

                {myReg ? (
                   myReg.status === 'approved' ? (
                     <div className="bg-green-600/10 border border-green-600/20 p-4 rounded-xl text-center space-y-2">
                        {isLive ? <><p className="text-green-500 font-mono font-black text-lg select-all">ID: {m.roomId || 'WAIT'}</p><p className="text-green-500 font-mono font-black text-lg select-all">PASS: {m.roomPass || 'WAIT'}</p></> : <p className="text-[10px] text-gray-500 font-bold uppercase">Room details precisely at {m.label}</p>}
                     </div>
                   ) : <button className="w-full bg-[#111] text-gray-600 py-4 rounded-xl font-black uppercase text-xs italic cursor-not-allowed">Checking Payment Proof...</button>
                ) : <button onClick={()=>setModal(true)} disabled={approved >= m.slots} className="w-full btn-engage py-4 rounded-xl text-xs uppercase shadow-xl shadow-gold/20">Join Tournament</button>}
              </div>

              {modal && <div className="fixed inset-0 bg-black/98 backdrop-blur-xl z-[150] flex items-center justify-center p-6 overflow-y-auto">
                <div className="bg-[#0f0f0f] border border-white/5 w-full rounded-[2.5rem] p-8 space-y-6 my-auto shadow-[0_0_100px_rgba(250,204,21,0.1)]">
                   <div className="text-center"><h3 className="text-2xl font-black text-gold italic uppercase">Arena Entry</h3><p className="text-[9px] text-gray-500 uppercase tracking-widest mt-1">Scan & Pay ₹{m.fee}</p></div>
                   <img src="./1000087879.jpg" className="w-40 h-40 mx-auto rounded-[1.5rem] border-2 border-white shadow-2xl" />
                   
                   {m.mode === 'SQUAD CS' ? (
                     <div className="grid grid-cols-2 gap-2">
                        {sq.map((s, i) => <input key={i} placeholder={`Player ${i+1}`} className="bg-black border border-[#222] p-2 rounded-lg text-[10px] font-bold text-white" onChange={e => { const n = [...sq]; n[i] = e.target.value; setSq(n); }} />)}
                     </div>
                   ) : <div className="p-3 bg-black rounded-xl border border-[#222] text-[10px] text-gray-600 text-center uppercase font-bold italic">Confirming: <span className="text-white">{user.ign}</span> (UID: {user.uid})</div>}
                   
                   <input type="text" id="master_utr" placeholder="12 Digit UTR Number" className="w-full bg-[#050505] border border-gold/30 p-4 rounded-2xl text-sm font-black focus:border-gold outline-none text-white text-center" />
                   <button onClick={()=>handleJoin(document.getElementById('master_utr').value)} disabled={load} className="w-full btn-engage py-4 rounded-xl text-xs shadow-xl">{load?'AUTHORIZING...':'SUBMIT PROOF ✅'}</button>
                   <button onClick={()=>setModal(false)} className="w-full text-[10px] text-gray-600 font-black uppercase text-center tracking-widest italic">Go Back</button>
                </div>
              </div>}
            </div>
          );
        }

        function MyGamesView({ list, regs, user }) {
          const myRegs = regs.filter(r => r.mobile === user.mobile);
          const approvedCount = myRegs.filter(r=>r.status==='approved').length;
          const pendingCount = myRegs.filter(r=>r.status==='pending').length;
          return (
            <div className="space-y-8 animate-in slide-in-from-bottom-5">
              <div className="space-y-1">
                <p className="text-gold font-black italic text-[10px] tracking-widest">// MISSION LOG</p>
                <h2 className="text-5xl font-black uppercase italic tracking-tighter">MY TOURNAMENTS</h2>
              </div>
              <div className="grid grid-cols-3 gap-3">
                 <div className="bg-[#111] p-4 rounded-xl text-center border border-[#1a1a1a]"><p className="text-[8px] text-gray-600 font-bold uppercase mb-1">Joined</p><p className="text-2xl font-black">{myRegs.length}</p></div>
                 <div className="bg-[#111] p-4 rounded-xl text-center border border-[#1a1a1a]"><p className="text-[8px] text-green-600 font-bold uppercase mb-1">Approved</p><p className="text-2xl font-black text-green-500">{approvedCount}</p></div>
                 <div className="bg-[#111] p-4 rounded-xl text-center border border-[#1a1a1a]"><p className="text-[8px] text-gold font-bold uppercase mb-1">Pending</p><p className="text-2xl font-black text-gold">{pendingCount}</p></div>
              </div>
              <div className="space-y-4">
                 {myRegs.map(r => (
                   <div key={r.id} className="bg-[#0d0d0d] rounded-2xl p-5 border-l-4 border-gold shadow-xl">
                      <div className="flex justify-between items-start mb-4">
                         <div><p className="text-[8px] text-gray-600 font-black uppercase mb-0.5">{r.mode}</p><h4 className="text-2xl font-black italic tracking-tighter">{r.label}</h4></div>
                         <div className={`px-3 py-1 rounded text-[8px] font-black uppercase border ${r.status==='approved'?'bg-green-600/10 text-green-500 border-green-600/20':'bg-gold/10 text-gold border-gold/20 animate-pulse'}`}>{r.status==='approved'?'Verified ✅':'Pending Approval'}</div>
                      </div>
                      <div className="grid grid-cols-2 gap-y-4">
                         <div><p className="text-[8px] text-gray-600 font-bold uppercase">IGN Name</p><p className="text-sm font-black tracking-tight">{r.ign}</p></div>
                         <div><p className="text-[8px] text-gray-600 font-bold uppercase">UID ID</p><p className="text-sm font-black tracking-tight">{r.uid}</p></div>
                      </div>
                   </div>
                 ))}
              </div>
            </div>
          );
        }

        function RewardsView({ user, players, db }) {
          const p = players.find(x => x.mobile === user.mobile);
          const streak = p?.streak || [];
          const today = new Date().toDateString();
          const canClaim = p?.lastLogin !== today;

          const claim = async () => {
             const ref = doc(db, 'artifacts', dbVersion, 'users', p.id);
             await updateDoc(ref, { lastLogin: today, streak: [...streak, today] });
             alert("Attendance Marked! Day " + (streak.length + 1));
          };

          return (
            <div className="space-y-10 animate-in zoom-in-95">
               <div className="text-center space-y-2">
                 <Calendar size={56} className="mx-auto text-gold mb-2" />
                 <h2 className="text-3xl font-black uppercase italic tracking-tighter">ELITE ATTENDANCE</h2>
                 <p className="text-[10px] text-gray-500 font-bold uppercase tracking-widest underline decoration-gold underline-offset-4 decoration-2">Sultanpur Elite Reward</p>
               </div>
               <div className="grid grid-cols-4 gap-4">
                 {[1,2,3,4,5,6,7].map(d => (
                   <div key={d} className={`aspect-square rounded-2xl flex items-center justify-center border-2 transition-all duration-500 ${streak.length >= d ? 'bg-gold border-gold text-black shadow-lg shadow-gold/30' : 'bg-[#0a0a0a] border-[#1a1a1a] text-gray-700'}`}>
                     <p className="font-black text-xl italic">{d}</p>
                   </div>
                 ))}
               </div>
               <button onClick={claim} disabled={!canClaim} className={`w-full py-6 rounded-[2rem] font-black uppercase italic shadow-2xl transition-all ${canClaim ? 'btn-engage shadow-gold/20' : 'bg-[#111] text-gray-700 grayscale cursor-not-allowed'}`}>
                 {canClaim ? 'Claim Daily Streak' : 'Marked for Today ✅'}
               </button>
            </div>
          );
        }

        function RulesView() {
          return (
            <div className="space-y-6 animate-in slide-in-from-bottom-5">
              <div className="bg-red-600/10 border border-red-900/30 p-10 rounded-[3rem] text-center shadow-xl">
                <ShieldAlert size={64} className="mx-auto text-red-500 mb-4" />
                <h2 className="text-3xl font-black italic uppercase text-red-500 tracking-tighter italic">Protocols</h2>
              </div>
              <div className="bg-[#0a0a0a] p-8 rounded-[2.5rem] border border-[#1a1a1a] space-y-6 text-[11px] font-bold text-gray-400 italic leading-relaxed shadow-inner">
                <p>1. <span className="text-gold">SOLO ONLY:</span> No teaming up allowed. Result: Hardware ID Ban.</p>
                <p>2. <span className="text-gold">ZERO HACK:</span> Use of Panels or Scripts result in Permanent ID Blacklist.</p>
                <p>3. <span className="text-gold">REFUNDS:</span> 50% refund for cancellations from our side ONLY.</p>
              </div>
            </div>
          );
        }

        function AdminView({ matches, regs, players, db }) {
          const [atab, setAtab] = useState('match');
          const [am, setAm] = useState({ label: '6:00 PM', hour: 18, fee: 40, prize: 200, slots: 48, mode: 'SOLO CS' });
          const pending = regs.filter(r => r.status === 'pending');
          const todayS = new Date().toDateString();
          const activeToday = players.filter(p => p.lastLogin === todayS);

          return (
            <div className="space-y-6 pb-20 animate-in fade-in">
              <div className="grid grid-cols-4 gap-2 bg-[#0a0a0a] p-1 rounded-2xl border border-[#1a1a1a]">
                <button onClick={()=>setAtab('match')} className={`py-3 text-[8px] font-black uppercase rounded-xl ${atab==='match'?'bg-gold text-black':'text-gray-600'}`}>Setup</button>
                <button onClick={()=>setAtab('reg')} className={`py-3 text-[8px] font-black uppercase rounded-xl ${atab==='reg'?'bg-green-600 text-white':'text-gray-600'}`}>Verify ({pending.length})</button>
                <button onClick={()=>setAtab('players')} className={`py-3 text-[8px] font-black uppercase rounded-xl ${atab==='players'?'bg-blue-600 text-white':'text-gray-600'}`}>Users</button>
                <button onClick={()=>setAtab('login')} className={`py-3 text-[8px] font-black uppercase rounded-xl ${atab==='login'?'bg-white text-black':'text-gray-600'}`}>Daily</button>
              </div>

              {atab === 'match' && (
                <div className="space-y-5 animate-in slide-in-from-top-4">
                   <div className="bg-[#0f0f0f] p-6 rounded-3xl border border-[#1a1a1a] space-y-4 shadow-2xl">
                      <h3 className="text-xs font-black text-gold uppercase italic">Arena Initialization</h3>
                      <div className="grid grid-cols-2 gap-3">
                         <select onChange={e=>setAm({...am, mode:e.target.value})} className="bg-black border border-[#222] p-4 rounded-xl text-xs font-black uppercase text-white"><option value="SOLO CS">Solo CS</option><option value="SQUAD CS">Squad CS</option></select>
                         <input type="number" placeholder="Total Slots" onChange={e=>setAm({...am, slots:e.target.value})} className="bg-black border border-[#222] p-4 rounded-xl text-xs font-bold" />
                         <input type="number" placeholder="Hr(0-23)" onChange={e=>setAm({...am, hour:e.target.value})} className="bg-black border border-[#222] p-4 rounded-xl text-xs font-bold" />
                         <input type="text" placeholder="Label(6 PM)" onChange={e=>setAm({...am, label:e.target.value})} className="bg-black border border-[#222] p-4 rounded-xl text-xs font-bold" />
                         <input type="number" placeholder="Fee(₹)" onChange={e=>setAm({...am, fee:e.target.value})} className="bg-black border border-[#222] p-4 rounded-xl text-xs font-bold" />
                         <input type="number" placeholder="Prize(₹)" onChange={e=>setAm({...am, prize:e.target.value})} className="bg-black border border-[#222] p-4 rounded-xl text-xs font-bold" />
                      </div>
                      <button onClick={async ()=>{
                         await addDoc(collection(db, 'artifacts', dbVersion, 'matches'), { ...am, hour:Number(am.hour), fee:Number(am.fee), prize:Number(am.prize), slots:Number(am.slots), roomId:'', roomPass:'' });
                         alert("Battle Published!");
                      }} className="w-full btn-engage py-4 rounded-xl text-xs uppercase shadow-xl tracking-widest">Deploy Arena</button>
                   </div>
                   {matches.map(t => (
                      <div key={t.id} className="bg-[#0d0d0d] p-4 rounded-2xl border border-[#1a1a1a] space-y-3 relative overflow-hidden">
                         <div className="flex justify-between items-center text-[10px] font-black uppercase italic relative z-10"><span>{t.label} {t.mode}</span><button onClick={()=>deleteDoc(doc(db,'artifacts',dbVersion,'matches',t.id))}><Trash2 size={16} className="text-red-600"/></button></div>
                         <div className="grid grid-cols-2 gap-2 relative z-10">
                            <input type="text" placeholder="Room ID" className="bg-black border border-[#222] p-3 rounded-xl text-xs font-mono font-black text-gold text-center outline-none focus:border-gold" onBlur={e=>updateDoc(doc(db,'artifacts',dbVersion,'matches',t.id),{roomId:e.target.value})} defaultValue={t.roomId} />
                            <input type="text" placeholder="Pass" className="bg-black border border-[#222] p-3 rounded-xl text-xs font-mono font-black text-gold text-center outline-none focus:border-gold" onBlur={e=>updateDoc(doc(db,'artifacts',dbVersion,'matches',t.id),{roomPass:e.target.value})} defaultValue={t.roomPass} />
                         </div>
                      </div>
                   ))}
                </div>
              )}

              {atab === 'reg' && (
                <div className="space-y-4">
                  {pending.map(r => (
                    <div key={r.id} className="bg-[#0d0d0d] border-l-4 border-gold p-6 rounded-2xl space-y-4 shadow-2xl animate-in zoom-in-95">
                      <div className="flex justify-between items-start">
                         <div><h4 className="text-xl font-black italic uppercase leading-none">{r.ign}</h4><p className="text-[10px] text-gray-600 font-bold mt-1 tracking-widest uppercase italic">M: {r.mobile} | UID: {r.uid}</p></div>
                         <p className="text-[10px] font-black text-gold uppercase italic">{r.label}</p>
                      </div>
                      {r.squad && <div className="bg-black p-3 rounded-xl border border-white/5 text-[9px] text-gray-500 font-black italic uppercase">Squad: {r.squad.join(', ')}</div>}
                      <div className="bg-black p-4 rounded-xl border border-[#222] text-center text-sm font-mono text-gold font-black select-all tracking-[0.2em] uppercase">UTR: {r.utr}</div>
                      <div className="flex gap-4">
                        <button onClick={()=>updateDoc(doc(db,'artifacts',dbVersion,'regs',r.id),{status:'approved'})} className="flex-1 bg-green-600 text-white py-4 rounded-xl text-[10px] font-black uppercase shadow-lg shadow-green-900/20 active:scale-95 transition-all">Verify & Approve ✅</button>
                        <button onClick={()=>deleteDoc(doc(db,'artifacts',dbVersion,'regs',r.id))} className="flex-1 bg-gray-900 text-gray-600 py-4 rounded-xl text-[10px] font-black uppercase hover:text-red-500 transition-all">Reject ❌</button>
                      </div>
                    </div>
                  ))}
                  {pending.length === 0 && <div className="py-20 text-center text-gray-700 uppercase font-black italic text-xs tracking-widest">Radar Clear: No Pending Regs</div>}
                </div>
              )}

              {atab === 'players' && (
                <div className="space-y-4">
                   <h3 className="text-[11px] font-black text-blue-500 uppercase italic px-2 tracking-widest underline decoration-blue-500 decoration-2 underline-offset-8">Master Database</h3>
                   {players.map(p => (
                     <div key={p.id} className="bg-[#0d0d0d] p-6 rounded-[2.5rem] border border-[#1a1a1a] shadow-2xl relative overflow-hidden group">
                        <div className="flex justify-between items-center border-b border-[#1a1a1a] pb-4 mb-4"><p className="font-black text-xl italic uppercase text-white tracking-tighter">{p.ign}</p><span className="text-[8px] bg-white/5 px-2 py-0.5 rounded text-gray-600 uppercase font-black">Elite Hunter</span></div>
                        <div className="grid grid-cols-2 gap-y-5 text-[11px] font-black italic uppercase">
                           <div><p className="text-gray-600 text-[8px] uppercase tracking-widest mb-1">Mobile No.</p><p className="text-gold font-mono tracking-tighter">{p.mobile}</p></div>
                           <div><p className="text-gray-600 text-[8px] uppercase tracking-widest mb-1">Passcode</p><p className="text-gold font-mono tracking-widest">{p.pw}</p></div>
                           <div><p className="text-gray-600 text-[8px] uppercase tracking-widest mb-1">Game UID</p><p className="text-white font-mono tracking-tight">{p.uid}</p></div>
                           <button onClick={async () => { if(confirm("Confirm user wipe?")) await deleteDoc(doc(db,'artifacts',dbVersion,'users',p.id)); }} className="text-[10px] text-red-600/40 font-black uppercase self-end text-right hover:text-red-500 transition-all">Remove Profile 🗑️</button>
                        </div>
                     </div>
                   ))}
                </div>
              )}

              {atab === 'login' && (
                <div className="space-y-4 animate-in slide-in-from-bottom-4">
                   <h3 className="text-[11px] font-black text-white uppercase italic px-2 tracking-widest border-b border-white/10 pb-2">Active Today ({activeToday.length})</h3>
                   {activeToday.map(p => (
                      <div key={p.id} className="bg-[#0d0d0d] p-5 rounded-2xl border border-green-500/10 flex justify-between items-center shadow-xl">
                         <div><p className="font-black text-white italic uppercase text-sm leading-none">{p.ign}</p><p className="text-[9px] text-gray-600 font-bold mt-1.5 uppercase tracking-widest italic">M: {p.mobile}</p></div>
                         <div className="text-right">
                            <span className="bg-green-600/10 text-green-500 text-[8px] font-black px-2 py-0.5 rounded border border-green-600/20 uppercase tracking-tighter">Active ✅</span>
                            <p className="text-[8px] text-gray-700 font-black mt-1.5 uppercase leading-none italic">Day {(p.streak || []).length} Streak</p>
                         </div>
                      </div>
                   ))}
                </div>
              )}
            </div>
          );
        }

        function LoginScreen({ onAuth, players }) {
          const [id, setId] = useState('');
          const [pw, setPw] = useState('');
          const [load, setLoad] = useState(false);
          const [err, setErr] = useState('');

          const submit = (e) => {
             if(e) e.preventDefault();
             if(!id || !pw) return alert("Fill credentials!");
             setLoad(true); setErr('');
             setTimeout(() => {
                if(id === 'admin' && pw === 'admin') onAuth({mobile:'admin', ign:'Master Admin', isAdmin:true}, false);
                else {
                   const ex = players.find(u => u.mobile === id);
                   if(ex) {
                      if(ex.pw === pw) onAuth(ex, false);
                      else { setErr('Something went wrong. Please try again.'); setLoad(false); }
                   } else {
                      onAuth({mobile:id, pw}, true);
                   }
                }
             }, 1000);
          };

          return (
            <div className="min-h-screen flex flex-col items-center justify-center p-8 bg-[#050505] font-sans">
              <div className="w-full max-w-sm text-center space-y-12 animate-in fade-in duration-700">
                <div className="space-y-4">
                  <div className="flex items-center justify-center gap-3">
                    <div className="w-12 h-12 bg-gold rounded-2xl flex items-center justify-center text-black shadow-[0_0_40px_rgba(250,204,21,0.2)]"><Target size={28} strokeWidth={3} /></div>
                    <div><h1 className="text-5xl font-black italic text-white leading-none uppercase tracking-tighter">APEX HUB</h1><p className="text-[10px] text-gold font-bold uppercase tracking-[0.4em] mt-1">Sign In To Play</p></div>
                  </div>
                </div>
                
                <div className="bg-[#111] p-10 rounded-[3rem] border border-[#1a1a1a] shadow-2xl space-y-10 relative overflow-hidden group">
                  <div className="text-left space-y-2">
                    <h2 className="text-6xl font-black uppercase italic text-white tracking-tighter leading-none">LOGIN</h2>
                    <p className="text-xs text-gray-600 font-bold uppercase leading-relaxed tracking-tight italic">Enter your credentials to drop into today's tournaments.</p>
                  </div>
                  
                  <form className="space-y-6" onSubmit={submit}>
                    <div className="text-left space-y-2"><label className="text-[9px] text-gold font-black uppercase tracking-[0.3em] ml-1">Email / Mobile Number</label><input type="text" value={id} onChange={e=>setId(e.target.value)} className="w-full bg-[#050505] border border-[#222] p-5 rounded-3xl text-sm font-black focus:border-gold outline-none shadow-inner text-white" placeholder="9876543210" /></div>
                    <div className="text-left space-y-2 relative"><label className="text-[9px] text-gold font-black uppercase tracking-[0.3em] ml-1">Password</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} className="w-full bg-[#050505] border border-[#222] p-5 rounded-3xl text-sm font-black focus:border-gold outline-none shadow-inner text-white" placeholder="••••••••" /></div>
                    
                    {err && <div className="bg-red-600/10 border border-red-600/30 p-4 rounded-xl text-[10px] font-black text-red-500 uppercase italic tracking-widest leading-none text-center">{err}</div>}
                    
                    <button type="submit" disabled={load} className="w-full btn-engage py-6 rounded-2xl text-sm uppercase shadow-[0_10px_40px_rgba(250,204,21,0.2)] border-b-4 border-yellow-700 active:translate-y-1 transition-all">{load?'AUTHORIZING...':'ENGAGE'}</button>
                  </form>
                </div>
              </div>
            </div>
          );
        }

        function SetupScreen({ user, onDone }) {
           const [ign, setIgn] = useState('');
           const [uid, setUid] = useState('');
           return (
             <div className="min-h-screen flex flex-col items-center justify-center p-10 bg-[#050505] font-sans">
               <div className="w-full max-w-sm text-center space-y-12 animate-in slide-in-from-top-6 duration-700">
                  <div className="space-y-4">
                     <p className="text-xs font-black text-gold uppercase italic tracking-widest underline decoration-gold underline-offset-8 decoration-2">// PROFILE INITIALIZATION</p>
                     <h2 className="text-5xl font-black uppercase italic leading-none tracking-tighter">SETUP IDENTITY</h2>
                  </div>
                  <div className="bg-[#111] p-10 rounded-[3.5rem] border border-[#1a1a1a] shadow-2xl space-y-8 relative group">
                     <div className="space-y-6">
                        <div className="text-left space-y-2"><label className="text-[9px] text-gray-600 font-black uppercase tracking-[0.2em] ml-1">Free Fire Name (IGN)</label><input type="text" placeholder="APEX_PRO" onChange={e=>setIgn(e.target.value)} className="w-full bg-black border border-[#222] p-5 rounded-3xl text-sm font-black text-white focus:border-gold outline-none shadow-inner" /></div>
                        <div className="text-left space-y-2"><label className="text-[9px] text-gray-600 font-black uppercase tracking-[0.2em] ml-1">Free Fire UID (ID)</label><input type="number" placeholder="123456789" onChange={e=>setUid(e.target.value)} className="w-full bg-black border border-[#222] p-5 rounded-3xl text-sm font-black text-white focus:border-gold outline-none shadow-inner" /></div>
                     </div>
                     <button onClick={()=>onDone({...user, ign, uid})} className="w-full btn-engage py-6 rounded-[2.5rem] text-sm shadow-xl border-b-4 border-yellow-700 active:translate-y-1 transition-all uppercase tracking-widest font-black italic">Engage Profile ✅</button>
                  </div>
               </div>
             </div>
           );
        }

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
